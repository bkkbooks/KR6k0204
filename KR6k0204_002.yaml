勝之地以二月望日始命僧祐律師親宣其文當時利益羣品應驗非一齊法之行於茲為盛此是水陸起教之始竊詳其事即阿難施食之遺意也陳隋之間此法暫隱至唐高宗咸亨年中時則有西京法海寺英禪師者因夢中往泰山府君所為演法事後過旬日獨坐方丈見一異人衣冠甚偉前來告曰弟子向於府君所竊覩尊容且知慈德及物甚多弟子聞世有水陸大齊可以利霑幽品其文是梁武所集今大覺寺吳僧義濟得之久置巾箱殆欲蠧損願師往求之以來月十五日如法修設英公許之尋詣大覺果得其文遂克日依法修齊既畢後見向異人與徒屬十數人來致謝曰弟子即秦莊襄王也又指其徒曰此范睢穰侯白起王翦張儀陳軫皆秦臣也咸坐本罪幽囚陰府昔梁武帝於金山設此齊時前代紂王之臣皆免苦得脫弟子是時亦暫息苦但以獄情未決故未得脫今蒙吾師設齊懺罪弟子與此輩并列國君臣皆承善力將生人間慮世異國殊故此來謝言訖而隱自是英公常設此齊而天下遵行之者逮今尤盛凡世之人有欲息災除病者欲求願乞福者欲資糧來報者欲升度先亡者未嘗不以是為先務焉矧經有云施諸鬼食便能具足無量福德則同供養百千俱胝如來功德等無差別信乎施鬼趣之食既同供佛亦應同彼三乘及餘五趣然則即此一食普霑法界平等廣大事盡理到如南嶽禪師所謂上供十方佛中奉諸聖賢下及六道品等施無差別即此義也我輩追惟佛祖垂教天下而於施食一門致意勤切者以一切衆生因得食故有二種益謂能近資色身以行六度遠資法身以顯四德原始要終其實一道我等生當末運竊服真風深知此道普博深遠供養中最於是與我同志恭依舊製增益新儀謂於古人所立名位不足者補之上堂增諸宗祖師護國神王起教大士三位下堂僧地府諸王及中陰二位使上下堂各列十位方為整足竊詳梁武首創此儀在天台之前是時宗教未明故於名位未能盡善今因而潤色之非為有所破立識者詳之重出者刪之僧寶已開作三乘請之不必更虗立僧伽一位或者以謂古人所立不可輒去者此徒能遵古而不思其不然也或以為三寶是總稱三乘是別稱者夫言總別必前後異時可也今於一處同時奉供豈可得論總別耶義未安者刊定之改辟支佛為緣覺使無知者免佛稱之疑而於三乘之名亦可易曉意未已者附益之如隨筵城隍當境宅神等雖於福德神位中已通請之今更別設以見施家專奉意齊法之備振古絶今當莫有過於此者罄法界等聖凡即水陸空行一切有生悉舉而普度之如為一人衆多亦然既飽以食又施以法法施食施無有二相淨名所謂於食等者諸法亦等諸法等者於食亦等蓋此大乘法食體是法界法界之理只一三諦然則於食於法均是三諦而此理未嘗不平等也是故我輩以能深推此理觀食當體本不可得即真諦也香味宛然即俗諦也非宛然非叵得既雙亡之復雙照之即中諦也得圓解者三諦一心絶待對無前後如此照理是為不可思議第一義諦如此行施是為無上第一法施也我等今者為欲依第一義諦行無上法施廣度羣品各遂正性繇是敬遵成法開建大會延四聖於午前召六凡於初夜盡十法界致平等供悲敬兩田無不具足求其所為之事雖有別意存焉莫不以此為緣而大興普度於此日者也動天地感鬼神警昏迷燭幽暗不離當念能發道心不離此心能開佛慧然則所以能建如是廣大之功者其在我大檀越此日之善用心也今則粵有奉佛某人敬發大心修營齊法聖凡等供無或有遺然恐儀禮未必周精意未必至以故未能感通聖心利益羣品而況於六道在迷衆生障重過多當召請時未必一念即能來至誠如是則法事雖舉將成虗設普度之功其實何在是以我輩已於先時敬憑使者修書通請上堂四聖及以諸天已荷光臨亨茲微供仍別委使者通書致請下堂六道一切羣靈及隨筵真宰受薦先亡冀在今宵來趨法會然恐地府幽囚未能自便於是備録施家拳拳之意專發奏章上達梵王乞行大赦仍備奏帝釋號召四大天王分遣天將同所委使者遍報六道會內一切羣生仍已移文地府泰山城隍當境諸廟請各伺候天庭赦文指揮盡地府所屬十方阿鼻諸大地獄正住八熱邊地八寒諸大地獄惡業重罪歷劫未脫一切極苦囚徒及泰山城隍當境諸廟一應山間水邊諸獨孤獄輕罪拘繫久未釋放者殺害呪詛怨讎論對未得伸理者一切受苦囚徒及當境管內新死故亡山林海島一切橫死傷亡無祀孤魂并人間地府餓鬼類中宿業為障歷劫拘囚者並照指揮悉與放行來赴道場受供聞法永脫幽途轉生淨土今則三寶在座梵釋同臨願於此時特垂悲憫所冀再與嚴戒天王諸將令使先時所召六道羣生若幽若顯克在今宵無一不至如是言之則知今辰所修齊法福利所及無有邊際固雖三寶聖賢無緣大慈普救普護所能至此實在乎施主勤勤懇禱之心以為之發起也故此虔祈伏惟冥監法師作禮而退表白為施主推廣普度之意發報恩願先為白言孤蟾高照江河沼沚現影無偏一雨均霑草木根莖受潤不別是知此日所營梵福豈唯私門獨被洪休要須專主於博施始可得稱於普度敬推齊意虔發願言用舉殊勳仰酬至化是以九重恭祝百辟俱資懷父母之生成感師友之訓誨蒙受故業銜荷舊恩念衣食之自來暨屋廬之託處當思報本豈不知心至若贊兩儀育物之權明三教誘人之道皆陳弘誓冀表真誠敢對慈悲特伸披露修齊功德恭為祝延今上皇帝聖躬萬歲伏願永膺天歷誕布皇猷允執厥中日新盛德克勤克儉無怠無荒四海歡心咸歸聖化修齊功德恭伸仰祝東宮太子德茂元良幼海澄清前星朗耀重離有慶萬國維貞列國諸王世為藩輔修齊功德恭伸仰祝中宮聖后天壽永延懿德宣明母儀天下上閣元妃才人采女賢淑貞良同膺天福修齊功德奉為仰贊儒宗賢哲學古力行格致誠正修齊治平此道大明化行天下修齊功德奉為仰贊公卿百僚增祿延壽事君以忠為政以德立身揚名傳家有慶修齊功德奉為仰贊外臺守令福祿昌熾布宣德化獄簡刑清風俗還醇人物富庶修齊功德奉為仰贊將帥部曲忠義威勇御衆有律安邊有謀不事于戈四夷賓服修齊功德奉為仰贊若官若史共務公平賄賂不行請託不顧獄訟明察無令枉濫修齊功德奉為仰贊若官若吏為政仁厚租賦所入悉本經常保養小民無令橫斂修齊功德奉為仰贊勢力官豪不矜富貴凡居鄉黨忠信仁恕存恤小民無令侵奪修齊功德奉為仰贊出家四衆福慧雙修萬行圓成三觀妙悟住持三寶無令斷絶修齊功德奉為仰贊弘教伽藍大明祖道法華大義止觀正宗有說有行貴逃數寶修齊功德奉為仰贊修禪叢席大明祖道單傳心印見性成佛宗說兼通貴祛暗證修齊功德奉為仰贊奉律伽藍大明祖道遮性兩戒持犯二門有說有行貴逃毀足修齊功德奉為仰贊仙宗道流助發正念但慕長生非是究竟當遂精勤求無上覺修齊功德奉為仰贊魔民男女開發正見但勤茹菜未是真修當遂回心進求大道修齊功德奉為仰贊官僚士庶勤行護法伽藍經像隨力修營廣度出家不斷佛種修齊功德奉為仰贊道族男女勤修淨業稱名誦經觀佛依正定散二善皆得往生修齊功德奉為仰贊道族男女常相勸發舉行大齊普度一切盡未來際無令間歇修齊功德奉為仰贊歷劫宗親增福開慧隨所居處常聞大乘進學菩提入佛知見修齊功德奉為仰贊高曾以來祖宗上世生産術業成立我身憑此追嚴增長福德修齊功德奉為仰贊生身父母增福開慧見在世者富壽康寧或以遷神即歸安養修齊功德奉為仰贊兄友弟恭妻和子孝奉承家訓行義有聞憑此良緣願增勝福修齊功德奉為仰贊師席友朋教誨我者世及出世嘉言至行憑此酬恩願增勝福修齊功德奉為仰贊此生恩舊提挈我者官祿財物俾至富貴憑此酬恩願增勝福修齊功德奉為仰贊外親眷屬情好密者患難相救饋遺往來憑此酬恩願增勝福修齊功德奉為仰贊梵釋四王諸天聖衆護持佛法光顯伽藍保護出家永無外侮修齊功德奉為仰贊天神地祇遊空真宰三災殄息風雨調和穀果豐成草木蕃廡修齊功德奉為仰贊護國天王係祀神靈保持土境常降吉祥主聖臣賢四民樂業修齊功德奉為仰贊鎮宅神王住居香火保持門戶訶禁不祥火盜災殃永無干犯修齊功德奉為仰贊盡法界內六道四生一切男女皆我父母憑此莊嚴增福開慧修齊功德奉為仰贊盡法界內地水火風一切依報皆我故身憑此莊嚴轉成妙境修齊功德奉為仰贊僕隸婢使奉承我者願承勝福俾脫賤流實冀他生免相責報上來施主虔對三尊恪意開陳三十二願報恩心滿普度功圓法界羣生齊成佛道法師施主同作禮上香表白述偈讚三寶宣疏此偈十二句出涅槃經獨一無侶無師自悟人中象王大法之師所可說法最上最妙諸佛所遊常不變易受正真法隨順修行一切衆生良祐福田讚歎三寶恭請證明茲日開建法界聖凡水陸普度大齊法事周圓所有疏文謹當宣讀宣疏畢再為施主祈福保安上來文疏披讀告圓仰冀慈悲特垂監念弟子某人伏願所修齊事本自誠心上奉三尊下度六道惟冀舉家眷序終日歡和飲食起居吉祥安樂增輝祖業垂裕孫謀既壽而康曰富且貴火災絶警寇黨迷蹤隨心有求無事不遂衆等無任歸依懇禱之至此祈叩語隨人換易為之未必專用此也法師施主俱作禮衆動鈸少時俱退齊退設香燈凡席大衆就一處誦經準獻狀回向上堂三位并下堂十位及隨筵諸位正誦經時須各安坐靜心肅淨口業不接俗語觀心誦經祖有明誥
