body:
  text: 宋四明東湖沙門志磐謹撰明古杭雲棲後學袾宏重訂行上堂召請法事門首設淨道香花幢幡燭籠等法衆動鈸法師施主上香表白唱言至心歸命禮十方法界諸佛法僧衆和常住三寶法師施主同時作禮表白振鈴執爐述然香偈呪諦此妙香緣起法本來無物即真空太虗周遍盡香雲即此難思為妙假非有非空皆絶待雙遮雙照必亡中仰憑中觀妙心香是日殷勤修法供我佛如來有然香真言謹當宣誦唵什伐栗多上末你平阿鉢羅句吒竹駕切蘇上破上二合囉上尼上毗迦知上虎𤙖呼今切二合誦呪三遍動鈸法師想香雲遍滿十方佛剎一切聖賢咸起護念表白振鈴述灑淨偈呪性水真空周法界湛然一器假難思若於空假二俱亡畢竟全彰中道義以此觀心融法水以茲法水淨諸塵若依若正盡光嚴洞徹十方無障礙我佛如來有灑淨真言謹當宣誦唵什伐囉賒咩羊鳴音耶𤙖癹悉哩摩呬娑訶誦呪三遍動鈸表白散花淨道上及以水灑四方上下淨道等法師想水所至處即成結界嚴淨廣博及想淨道如光明雲樓閣千萬重纍其上表白振鈴述召請偈稽首十方無上覺圓詮教行理三經大心菩薩大乘僧緣覺聲聞三寶衆傳教四依稱列祖天仙八部衆神王我今普度建壇場願展慈光垂密證表白宣召請文伏以非如非異是為以佛眼觀何聖何凡此則於法界一境俱智寂體兼用冥函與蓋以相應水共波而不別至若隨時起教為實施權雖分別於多門終指歸於一道然則理繇事見化以機興亡絶待中固不涉離微之論顯正因性必須憑緣了之修是以明燈獻華低頭合掌要莊嚴於萬行俾圓妙以三身故知寓跡於有為畢竟歸原於無作爾乃恪遵洪範庸尚多儀崇水陸之清齊極地天而普濟妙供養海納衆流而愈深勝功德林挺千枝而並秀今則特開嘉會寅奉慈尊延內懷四攝真人集外現二乘高士召五通之仙黨來八部之天倫撫盛席以端居即香肴而克享施心既啓覺慧遍知恭事請迎願垂臨降表白唱言一心奉請盡虗空遍法界十方常住一切諸佛并諸眷屬清淨法身毗盧遮那佛圓滿報身盧舍那佛千百億化身釋迦牟尼佛西方極樂世界大慈大悲阿彌陀佛兜率天宮一生補處當來下生彌勒佛過去大通智勝佛等一切過去諸佛現在淨華宿王智佛等一切現在諸佛未來華光佛華足安行佛等一切未來諸佛東方善德佛等十方法界一切諸佛過去莊嚴劫始自華光佛等千佛現在賢劫始自拘留孫佛等千佛未來星宿劫始自日光佛等千佛十方法界一切諸佛全身舍利寶塔惟願不違本誓哀憫有情是日今時降臨法會衆和香花請動鈸法師想十方佛乘寶座不謀自來畟塞虗空了了可見彼諸如來雖常能應而實繇我心之所能感而此能感實繇心具心具而感非從外有一心奉請盡虗空遍法界十方常住一切尊法并諸眷屬大方廣佛華嚴經梵網戒經諸經法寶鹿苑會中佛集本行四阿含等諸經法寶方等諸會淨名金光明等經諸經法寶大品般若仁王金剛般若等經諸經法寶大乘妙法蓮華經大般涅槃經諸經法寶專談淨土觀無量壽佛經等諸經法寶五時所說大小兩乘諸部律論一切法寶西天此土三乘聖賢說經造論著述疏記龍宮所祕竺土未來諸經律論一切法寶十方國土水鳥樹林塵說剎說一切法音惟願不違本誓哀憫有情是日今時降臨法會法師當想十方諸佛所說大千經卷無邊教道能開妙解是為教經教即般若以般若之智在於說故復能照了諸經所詮一切行門依而行之必能趣果是為行經行即解脫以解脫之用從於緣故復知無邊教道一切行門法法常體即是實相是為理經理即法身以法身之理是所顯故然此教行理者雖有三名不出一體修圓觀者一心中得作此觀時當如教繇智說即是真諦行從緣起即是俗諦體此實相即是中諦三諦一心無前後異即是圓悟不思議之三經也又須諦觀十方常住無量經卷常放光明離染清淨為赴我請顯現道場而此顯現繇我能感及以本具一心奉請盡虗空遍法界十方常住諸菩薩僧并諸眷屬文殊師利八萬大士普賢大師無邊菩薩觀世音大勢至清淨海衆諸大菩薩藥王藥上法華經中諸大菩薩賢首菩薩華嚴經中諸大菩薩善財歷參五十三善知識諸菩薩信相菩薩金光明經中諸大菩薩兜率內院無著天親諸大菩薩極樂國土一生補處諸大菩薩五時法會助宣佛化諸大菩薩藏通別圓所歷地位一切菩薩惟願不違本誓哀憫有情是日今時降臨法會法師想十方菩薩各乘華座不來而來畟塞虗空了了可見此下諸位賢聖皆當作感應心具二義運想一心奉請盡虗空遍法界十方常住諸緣覺僧并諸眷屬仁王護國經中八百萬億大仙緣覺佛出世時從山中來五百獨覺佛法滅後一時出現七百俱胝獨覺出有佛世聞法得道諸大緣覺出無佛世自然悟道諸大獨覺出無佛世部行麟喻諸緣覺獨覺具相不具相諸緣覺獨覺現通不現通諸緣覺獨覺說法不說法諸緣覺獨覺通教八地辟支佛藏教辟支佛惟願不違本誓哀憫有情是日今時降臨法會法師想十方緣覺嚴肅威儀從空而至一心奉請盡虗空遍法界十方常住諸聲聞僧并諸眷屬鹿苑先度五比丘最後須跋陀羅諸阿羅漢世尊高弟大迦葉阿難陀等十大弟子靈山聞法大比丘衆萬二千大阿羅漢靈山得記學地無學地諸大聲聞衆五時聞法學地無學地諸大聲聞衆世尊滅後結集三藏阿難陀等諸阿羅漢住世十六大阿羅漢萬六千九百弟子衆天台山方廣聖寺住世五百大阿羅漢慧俱無礙三解脫信行法行六種阿羅漢通教體法已辦藏教學無學內外七賢衆惟願不違本誓哀憫有情是日今時降臨法會法師想十方聲聞嚴肅威儀從空而至一心奉請十方法界傳持教法禪律諸宗諸祖師僧并諸眷屬西天傳教迦葉龍樹師子尊者等二十三祖北齊尊者南嶽禪師天台智者大禪師章安尊者荊溪尊者等九祖四明法智大師禪宗達磨圓覺禪師下及六祖等諸大禪師臨濟溈山洞山雲門法眼五宗諸大禪師廬山蓮社圓悟法師歷代往生淨土諸法師賢首教主國一法師清涼圭峯諸大法師慈恩教主大乘法師瑜伽密教灌頂國師律宗十祖南山澄照律師記主大智律師譯經摩騰竺法蘭求法奘三藏等諸法師惟願不違本誓哀憫有情是日今時降臨法會法師想諸祖師嚴肅威儀從空而下一心奉請十方法界助宣佛化持明造論五神通仙并諸眷屬過去十方諸佛往昔因地同行五神通仙釋迦文佛往昔因地同行千聖王五神通仙釋迦文佛往昔同行忍辱五神通仙護育釋種瞿曇仙人占相太子阿私陀仙色界諸天下生人間為受道者五神通仙華嚴會中善知識衆毗目瞿沙一萬大仙鹿野園中轉法輪處往昔波羅奈仙人請雲雨會那羅他九萬九千五通仙人方等會上阿瑟吒迦等六十八大仙人諸國土中攝諸呪術造五明論諸大仙人惟願不違本誓哀憫有情是日今時降臨法會法師想十方五神通仙容服肅敬從空而至一心奉請十方法界十大明王穢迹金剛諸大天王護法諸天并諸眷屬大威德不動尊等十大明王穢迹金剛聖者華嚴會中妙𦦨海大自在天王等諸天王妙莊嚴宮大梵天王忉利天宮帝釋天主多聞天王持國天王增長天王廣目天王摩訶天女大功德天大辨天天母摩利支天金剛密迹神王北天大將散脂修摩尊天南天上將韋䭾尊天菩提樹神善女尊天大地主母堅牢地神歡喜藥叉將鬼子母天散脂大將所領二十八部威德大權天神法華會上從佛聞法人非人等天龍八部惟願不違本誓哀憫有情是日今時降臨法會法師想諸天天神無央數衆或喜或瞋威儀非一聞今召請從空而至一心奉請十方法界護佛舍利壇塔伽藍齊戒護國鎮宅諸大神王并諸眷屬護佛舍利般支分婆多祈利等四大軍主護戒壇堅固光曜淨雲音等十二大神王護佛塔修利犍陀摩尼跋陀等五大神王護伽藍美音梵音天鼓歎妙等十八大神王護震旦國毗首羯摩天子迦毗羅大將雙瞳目天女一切神衆護受三歸彌栗頭不羅等護五戒察芻毗愈他尼等諸大神王護比丘軻彌迦羅移嘻隸等百七十二大神王佛滅度後護佛弟子多賴哆等七神王守鎮宮宅東方阿修訶等五方上首神王六齊觀察人間四天王各九十一子各八大天將四天捷疾使者惟願不違本誓哀憫有情是日今時降臨法會法師想諸神王威容嚴肅聞今召請從空而至一心奉請發揚水陸流通至教製儀立法十大士并諸眷屬發揚施食流通至教阿難陀尊者聖師最初示夢勸興水陸梁朝神僧聖師勸發製水陸儀梁朝志公尊者聖師製水陸齊儀國主救世菩薩梁武皇帝最初建會秉法宣文梁朝祐公律師中興水陸齊法唐朝法海英公禪師總持感驗稱名樓至宋朝佛印禪師詳定舊儀申明齊法長蘆賾公禪師修崇齊法繪像製讚太師蘇文忠公祖述舊儀製文行世東川節推楊公惟願不違本誓哀憫有情是日今時降臨法會法師想諸大士願力深重聞今召請即時降赴上來召請上堂三寶十位聖賢無央數衆一念能感聖應昭然更誦密言用伸勤重我佛如來有召請真言謹當宣誦南無三滿多母陀南唵烏佐鉢囉諦賀多諦薩縛怛多孽多俱舍冒地唵娑哩野沒哩布羅迦也薩訶誦呪三遍動鈸法師想上來召請三寶諸天一切聖賢普皆雲集住淨道上寶樓閣中光明交映無有障礙表白白言願因祕密俱賜光臨檀越歸依虔誠作禮法師同施主三拜表白請一切聖賢前臨沐浴白言金剛正體豈非堅密之身玉毫淨光斯為真實之相畢竟本來無垢當知何處有人是則開陳沐浴之門為欲洗滌塵勞之類冀回蓮瞬俯監葵傾將奉導於聖儀幸前臨於溫室燈籠幢幡香花供具前行大衆引淨道至浴所表白至浴室前獻浴白言蓮華藏海當體圓成流泉浴池隨處顯發湛湛兮八功德水巍巍乎五分法身須知諸佛元不洗塵為欲衆生皆令離垢想見受茲灌沐夜月之印澄潭現諸威儀朝曦之升遠漢敬宣密語請濯溫泉用表法門不壞世諦我佛如來有沐浴真言謹當宣誦唵底沙底沙僧伽娑訶誦呪三遍大衆動鈸歌讚表白至浴室灑淨法師想此浴室七寶所成寬廣嚴淨一切聖賢隨順施者獻浴之意皆入中浴表白振鈴宣偈諸佛法身常本妙以由緣了為莊嚴寂而常照絶言思如谷答聲無不應載仰三乘并八部隨宜益物顯慈威至哉方便有多門端自大權悲智起此日修齊興普度十方賢聖悉雲臨為陳沐浴順彝儀了達聖軀元離染曠矣戒池無有際湛然定水鎮常盈澡除心垢得清涼要使羣生開妙悟聖賢浴罷表白振鈴白言沐如來金剛身示同塵凡之法著舍那珍御服用嚴尊特之容惟大聖之既臨諒羣從之畢至是則星羅開士霧擁聲聞梵王執蓋以當空帝釋散華而布地飛幡前導鳴樂後隨冀俯就於道場用肅成於齊事大衆動鈸威儀導引至道場周回行道表白振鈴獻寶座白言惟聖賢之既至慮几席之未嚴照中道妙觀心達法性無住本全體顯發當念出生師子座盈滿虗空寶華臺周遍國土莫不高廣悉有光明仰冀慈悲俯垂納處我佛如來有獻寶座真言謹當宣誦唵㫊暮伽鉢頭摩遜娜馱羅馱囉抳漫拏吽誦呪三遍動鈸法師想道場廣博嚴淨無量寶座周匝虗空一切聖賢安住其上表白白言趣舉一香備明三觀是以了真空則無性無相寄妙假則為蓋為雲不離緣起之心全彰中道之理以茲法供達彼凡誠洛誦靈文益資勝用我佛如來有然香真言謹當宣誦唵阿㰤囉阿㰤囉薩縛苾地耶馱囉布爾底莎縛訶誦呪三遍動鈸法師想此香雲出生無量七寶宮殿供具衣服妙樂妙華甘露肴膳於諸聖賢之前一時奉供無不周遍表白獻花白言惟衆華之開發表萬行之莊嚴是故信解以植立其本根精進以扶疏其枝葉既潤之以定水又拂之以慧風蓋將培自己功德之林於以顯本有圓實之果我佛如來有獻華真言謹當宣誦唵阿㰤囉阿㰤囉薩縛苾地耶馱囉布爾底薩縛訶誦呪三遍表白於聖座周匝散華大衆動鈸法師想所奉華出生七寶臺殿珍妙衣嬰天樂妙香甘露肴膳種種供具重重無盡於各聖賢之前一時奉供無不周遍表白灑淨白言一器之水至約三諦之功宛存是以論其性則本於真空隨所用則見乎妙假二邊莫立中道不安憑圓觀之融通助真言之祕密潔茲座席淨諸根塵是皆即事以明心要在忘情而照理我佛如來有灑淨真言謹當宣誦唵伐什囉賒咩耶吽癹悉哩摩呬薩訶誦呪三遍動鈸表白持水灑聖座法師想水至一一席座諸供養上無不光潔表白宣意旨白言奉延三寶畢集諸天已安住於道場復證明於齊法必因疏旨用達自情恭對敷陳伏惟采聽讀意旨畢表白懇禱仰投尊境虔露卑忱如是祈求誠為懇切載念修崇之際應多簡陋之愆或主法者無德以堪或行施者用心之隘或道場之失度或供事之闕儀諒在大慈少寬衆過俯徇下愚之請冀成嚝濟之緣惟福報稍微者尚恐莫聞若罪情極重者何繇可至敕梵王而肆赦囑帝釋以埀恩分差捷疾之倫各領通傳之任盡令七趣俱會一時惡逆不宥之囚徒當蒙自便業纍相關之罪輩悉使偕來矧惟遍知常興普應是以淨光照燭無幽而弗明神力提持何苦而不拔敢祈威重少俟須臾為受清齊勉從至願衆等無任懇禱激切屏營之至衆動鈸法師大衆施主暫退點心仍專令一誠恪人守護道場勿令雜人干犯齊禁少頃法師領施主再入道場上香衆動鈸表白執爐振鈴宣偈歸命三尊無有上天仙八部共垂慈我今依教奉清齊為誦密言先遍食表白遍食白言諦觀茲食不外吾心繇知諸法常融故得六塵互遍是則出醍醐之上味宣栴檀之清芬雨七寶以穰穰散四華而灼灼聳光明之臺殿列殊勝之輦輿仙樂鳴空笙磬之音間作天衣擁霧珠瓔之飾下垂以念念具足不虧故彼彼莊嚴無盡惟此道場之內紛然事儀之多是以淨水明燈懸幡揭蓋金鐃之聲震幽谷梵唄之響薄層霄悉入此宗元非他物至若了目前之法妙觀世間之相常鵲噪鴉鳴總是深談般若溪光山色無非全露遮那互古今不昧己靈極依正皆成法供莫不自存妙假性本真空雙照二邊全彰中道用一心之圓觀扶三德之密言庶憑助顯之功用發等熏之意我今持誦無量威德自在光明勝妙力陀羅尼加持法食悉令周遍曩謨薩嚩怛他蘖跢嚩路枳帝唵三跋羅三跋羅吽大衆誦呪令足滿二十一遍經云若欲供養三寶應以香華飲食加持二十一遍則成天肴膳上味奉獻十方三寶即為滿足檀波羅蜜呪畢動鈸表白以水散灑食上周匝令遍法師當知食即法界具一切法故能想此淨食出生種種甘露上味及各肴膳如前遍食文中六塵互遍彌滿法界又知依正莊嚴一切諸法妙觀觀之均為法供一時普獻十方三寶天仙聖賢之前無不周遍表白振鈴獻供白言唯是一心唯是一食以唯食則一切法趣食以唯心則一切色趣心此心融時色亦融於法等者食亦等是則普入三際其性常住大包十虗其體恆周性常住故一念不生體恆周故當處不動不動則一切處有不生則一切念空一切念空兮真空不空一切處有兮妙有非有圓照二諦兮不取不捨融會一如兮絶言絶思如是觀心如是觀食何心非食何食非心是為同一覺源畢竟俱名法界今則奉為某人宏開嘉會上奉慈尊敢輸檀越之誠仰效純陀之供大慈憫物弘誓在懷為度有生示受此食一心奉供盡虗空遍法界十方常住一切諸佛并諸眷屬惟願不違本誓安住道場是日今時受茲供養衆和香華獻動鈸下例此表白振鈴宣偈并述讚文法性體周誰不具修成報智是為真自他受用事雖殊應化實繇機感見此土能仁弘教主西方清泰聖王師天宮慈氏俟當來補處下生宣大化三世十方無上士人間天上獨稱尊自茲以外遍塵沙無量無邊俱奉供伏以遮那妙體無非十界十如般若靈知不出一人一念起上下冥資之智現自他受用之身雖實報之是居於寂光而不動至若乘時利見設化知宜為九道之歸依獨尊無侶以一音而演說得解隨機良繇自住大乘乃能究盡諸法壽量極長則逾於塵點光明遍照則過彼河沙定慧力以自莊嚴天人類無不宗奉惟願湛然真應熟此方震旦之緣嚝矣大慈受茲日檀那之供示八自在顯六神通冀普度於迷流俾咸登於樂土大衆和云故我一心歸命頂禮法師施主同時作禮表白白言一心奉供盡虗空遍法界十方常住一切尊法并諸眷屬惟願不違本誓安住道場是日今時受茲供養表白振鈴宣偈并述讚文佛說華嚴圓頓旨聲聞聾啞末堪聞脫珍著弊為施權不動寂場遊鹿苑方等廣開諸法會褎圓歎大俾回心盛談般若顯真空成熟羣生開佛慧最後靈山宣妙法指權即實更非他涅槃唱滅捃殘機演說真常朋佛性經歷五時俱有序分張八教本隨宜了知曾不外三千故我今辰勤奉供伏以軌之成道法為諸佛所師煥乎有章經通五人共說列八教偏圓之目開三乘小大之門雖初後之多時實卷舒於一化如筏喻者已到岸則應捨所乘以指言之既見月則必忘其示然則出世度生之本在乎開權顯實之功是知說斯要於靈山將欲演茲文於大地遂令末代獲究真詮識箱轂輪軸更無別車會沼沚江河皆同一水惟願正因體遍不遺此方震旦之緣中道理彰豈外檀那今日之供言辭寂滅性相混融冀普悟於迷倫俾咸開於本覺大衆和云故我一心歸命頂禮法師施主作禮表白白言一心奉供盡虗空遍法界十方常住諸菩薩僧并諸眷屬惟願不違本誓安住道場