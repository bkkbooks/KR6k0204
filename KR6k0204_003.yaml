敬修齋事盡行攝召無使遐遺宜舉衆以偕來冀聞法而得度法師想所召孤魂無央數衆從四方來却住一面表白唱言一心奉請十方法界佃漁殺害一切生靈橫死孤魂并諸眷屬惟願不迷本性承佛威光今夕今時來趨法會體天道之好生去人心之喜殺未論得福且免遺殃何惡俗之無良縱癡情而故犯是以網魚蝦於大澤逐麋鹿於深山烹羊取羔屠牛作炙炮鱉膾鯉臘雞蒸豚每痛割其脂膏用飫資於口腹以繇市井索者常衆故令漁獵求之益多當其體解刀砧魂驚湯火既遭極苦遂結深怨至於為蜜掇蜂因珠破蚌挾彈墮林間之彎弓落雲外之雕只知欺物命之微終莫慮仇家之對爾乃踐路旁之遊蟻飲水內之末蟲此雖出於誤心當亦招於來報若夫聚蠅之投身酒器飛蛾之撲翅燈缸固委命之在他實設機之自我若云尚道亦足傷慈其有種類之各起侵陵小大之遞相吞啖一朝一夕萬死萬生以彼此加害不休故次第責報無已如斯情狀深可悲憐今則有信心敬修齋事盡行攝召無使遐遺宜舉衆以偕來冀聞法而得度法師想所召孤魂無央數衆從四方來却住一面表白唱言上來召請諸類孤魂非仗密言安能畢集我佛如來有召請真言謹當宣誦唵什伐囉俱胝阿揭吒尾揭吒薩訶誦呪三遍畢動鈸法師想上來召請諸類孤魂承法力故皆具端正儀相上升淨道住樓閣中願因祕密來集道場施主虔誠至心作禮施主作禮法師觀地獄囚徒業障者雖蒙召請未能脫離有異方便可使畢至表白振鈴為開地獄白言三寶垂恩九天肆赦凡茲有召無或不來維地府之拘囚以罪根之深固此界他界之隔異正住邊住之分殊鐵釘釘體則遍體皆瘡石磨磨身則全身俱碎烈火洞𮌎而赫赤煬銅灌口以淋漓以受苦正爾昏迷故聞命莫之領曉斯繇自業之為障且非主者之不慈至若泰嶽諸司城隍列廟冥觀此處實蕃有徒或仇對之相干及事情之未決皆能阻滯莫遂進趨豈唯上失於佛懷將必有孤於檀度今則敬宣偈呪大闡威神牢關一擊而開罪輩羣奔而出無論貴賤罔間怨親冀齊到於道場俾咸沾於法供我今奉宣華嚴會中覺林菩薩所説破地獄偈及為持誦破地獄真言能使一切地獄受苦囚徒永脫幽區轉生善道若人欲了知三世一切佛應觀法界性一切唯心造大衆同誦偈七遍更多尤勝唵佉羅帝耶娑訶大衆同誦三七遍更多尤勝法師想十方地獄鐵城門戶一振而開其中一切苦具悉皆隱沒一切囚徒聳聞呪音咸識本心共相告報來趨法會念求解脫表白振鈴為開道路白言互古逮今際天極地已悉行於號召曾不棄於玄微故凡居有性之倫盡優入無遮之會至於具造十惡久處三塗雖令自便於此時猶或未通於前路跌足於嶮巇之地縻身於幽暗之鄉若此多艱何能善達載憑祕密之力示現光明之幢將徹照於昏衢冀無失措俾安行於直道幸遂知歸惟爾英靈悟茲方便我佛如來有開道路真言謹當宣誦唵鉢那弭矃皤伽縛底慕賀野慕賀野惹孽慕賀矃莎嚩訶誦呪三遍畢動鐃鈸法師想三塗之內無數衆生惡業所障迷失道路者承此呪法力故即得坦平大道來至法會表白振鈴為離怖畏白言六凡類多極顯冥而俱至三尊威重諒畏愛之兼懷非憑方便慰悅衆心恐或逡巡卻退一面乃宣祕語以破前機冀頓忘驚怖之情俾咸獲安詳而住我佛如來有離怖畏真言謹當宣誦唵怛你也他伐帝陀矃陀囉枳俱盧度盧銘娑訶誦呪三遍畢動鈸法師想三塗之內無數衆生雖到法會惡業為障內心畏怯今承呪力即得身心安泰無如畏恐表白振鈴為開咽喉白言彼醜其形斯名曰鬼頭若山峰之聳咽如針孔之微悵水漿之莫通諒飢餒之惟甚三塗雖異衆類良多以因行之或同故果報之相似用宣祕密大破慳貪冀飲膳之甘和必喉吭之寬暢我佛如來有開咽喉真言謹當宣誦唵吉利鳩摩唎咻𠺕咻𠺕叉𠺕叉𠺕娑訶誦呪三遍畢動鈸法師想三塗之內無數衆生以宿業故咽喉微細飲食不通今承呪力即得寬大無所塞礙表白振鈴為六道羣生解釋怨結白言諸法本空寧有我人之相此心無黨何分恩怨之情繇不了外境之非他故妄認此身之為自於是更相你汝各立封疆因意向之稍違及言辭之靡順悻然變色遽行非理之瞋忽爾生憎遂起無根之謗其有恃長上而欺孤寡處豪貴而虐卑微侵鄰翁之地以廣新居奪市人之財以實私帑妄肆鞭笞之酷濫加獄訟之冤怙勢陵人謾心背義甘血肉而資口腹罔念傷生興呪詛而干鬼神豈逃論對於是互相責報無有已時皆緣釁起於一朝遂使禍連於多劫今則三尊畢會六趣咸臻將同稟於真修必先祛於宿憾忍心一發辱境何存念仇讎本我親姻視男女皆吾父母永銷結恨各起深歡袂屬裙聯直趣菩提之路心開意解咸登解脫之場母自失於良時當進求於勝益我佛如來有解怨結真言謹當宣誦唵三多羅佉多娑訶誦呪三遍或大衆同誦多遍更勝法師想六道羣生無始世來常積怨結今聞呪法咸起歡心一時消釋轉相親愛表白振鈴請赴浴室白言六趣之居不同無非濁惡三塗之報最醜悉是腥臊若云即事以為言未免於心而有礙須親澡浴冀得輕涼法水初沾見全身之光潔慈風一拂俾當念以開明毋故遲回宜當趨進大衆奉迎淨道至浴室前安設表白獻浴白言湢室宏開盡十方而洞達溫泉滿注極四海以周流咨爾羣靈紛然同入湛定水而一沐芬戒香以三熏盡忘業纍之相關豈存煩惑更無色相之迭見唯是真如匪徒事於空談要當期於妙悟我佛如來有沐浴真言謹當宣誦唵底沙底沙僧伽娑訶誦呪三遍畢法衆動鐃鈸歌讚表白至浴室灑淨法師想此浴室寬廣嚴淨自然光明六道羣生無央數衆聞前法音皆入中浴承法力故不相妨礙身意快然得大安樂表白振鈴述偈讚云六道四生俱法界若幽若顯數難量殊名異號本虗稱奇相劣形皆幻質倏往倏來同過隙方生方滅等浮漚皆從一念失元明遂使有身隨妄報此日檀那興普度佛天高會肅清齋仰憑慈力為提持攝取羣生無不至欲使歸依回正道先須澡浴淨諸塵外塵既淨內心融始可前趨承法供浴畢表白振鈴施六道衣服於浴室前焚化冥衣無則已之白言入室而悟水因既宣明於妙觸澡身而去塵穢載謹肅於外儀繇親承佛力之加俾悉反人形之舊同然一相會彼千差將親近於尊容必莊嚴於盛服宣之以真言祕密照之以妙觀幽微發起淨緣資成等施天衣自然被體不待意求法藥普與熏心何論念感以我志蘊利人之願故他修有益己之功即類而推無事不可我佛如來有治衣真言謹當宣誦唵㫊暮伽𮄽𬼨並身切縛塞窒𭋹主嚕主嚕莎縛訶誦呪三遍畢動鐃鈸法師想六道羣生無央數衆承法力故同作人形顏貌端正自然衣服莊嚴其身威儀濟濟欣懌無量表白振鈴召入白言不洗塵不洗體既妙悟於圓通必振衣必彈冠復善修其容止斯可預無遮之會是為登大覺之門宿學深者於茲煥發性靈自障重者至此頓忘業習願承師教當於今夕而知歸甚適我懷應以此身而得度幸聞善誘宜即歡趨大衆動鈸奉迎淨道至道場外當中安設及番華之屬仍先列一牌於淨道外牌上刻字云六道以下一切羣生并受薦神衆次第立於此參禮三寶
