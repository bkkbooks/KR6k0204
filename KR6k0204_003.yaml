body:
  text: 宋四明東湖沙門志盤謹撰明古杭雲棲後學袾宏重訂行下堂召請法事本日早告赦晚召請告赦須用五更勿見明相門首設香華幢幡燭籠淨道之屬衆動鐃鈸法師施主上香表白唱言至心歸命禮十方法界諸佛法僧衆和常住三寶法師施主同時作禮表白振鈴然香白言謂之香則萬法之都名舉其體則三德之全分若燒一塵具足衆氣不離當處周遍十方自非有能熏之功何繇見所顯之理今則欲憑勝用為達真誠布香雲無盡之光集法界在凡之衆一聞號召毋或遲回宜各飭其有徒咸如約而來會我佛如來有然香達信真言謹當宣誦唵什伐栗多末儞阿鉢囉句吒蘇破囉尼毗迦知虎𤙖誦呪三遍畢動鐃鈸法師想香雲海承佛威力遍至法界六道羣生之前悉令覺知咸發喜心願趨法會表白振鈴灑淨白言諦觀此水必有其源從自心阿耨達池流通不已入本性薩婆若海深廣無涯至於注寶器以盈盈誦真言而馺馺清斯几席潔彼根塵自非三智常會所宗何繇一時能具此用我佛如來有灑淨真言謹當宣誦唵什伐囉賒咩耶𤙖癹悉哩摩呬娑訶誦呪三遍畢動鈸表白持水散灑四方上下及淨道上并散華於淨道法師想水至處嚴淨廣博即成結界及想淨道如光明雲樓閣千萬重纍其上表白振鈴述召請偈歸命三尊無有上四依賢聖大乘師創興水陸大齋儀起教流通諸大士今我投誠崇勝法廣開普度大壇場洪恩曠蕩不思議六道四生咸受賜表白宣召請文伏以聖凡靡間謂三諦之理本如情智乍分故十界之事或異水殊冰而共溼胡非漢而俱人要知不失所宗則能常得其體至若根塵對起物我交傾所造之習弗同受報之果隨別以稟質或妍或醜故嬰苦有重有輕栖栖乎水陸空行續續乎死生中陰如斯不了畢竟何歸性釋尊乘可度之機誕彰明教至梁武營無遮之供庸闡真修豈唯寓悲敬於兩田抑亦聚怨親於一席仁風振蕩惠澤周流冀成普濟之深緣用發等熏之上利今則特開嘉會寅奉慈容既畢集於三乘復廣延於八部端臨午日虔事清齋幸垂恩於九域之區俾蒙益於羣生之類載營淨食克就良宵導之以中觀之功出生無盡加之以真言之法微妙難思事理相融一多互攝以此不住相施顯茲無所作心召天人修羅之倫及鬼畜泥犁之黨具以色香美味飫茲飢餒虗腸去熱惱而獲清涼離怖畏而得安樂惟願佛光照燭法力提攜才聞召請之言即攝威儀而至表白唱言一心奉請十方法界四空四禪六欲諸天日月星天天曹聖衆并諸眷屬無色界非想非非想處天等四空天衆色界色究竟天善現天等四禪十八梵天衆欲界他化自在天樂變化天等六欲天衆日天子月天子北極紫微大帝南極太微大帝北斗七元星君南斗六司星君九曜星君三台華蓋二十八宿十二宮辰太歲星君國主元命生靈所屬施家各人本命星君天曹府君主陰陽賞罰注記生死諸大天官天府北極四聖真君漢天師正一靈應真君天地水府三官天府功德司判官行空捷疾使者惟願不迷本性承佛威光今夕今時來趨法會大衆和香華請動鐃鈸下去並例此法師想天道聖賢無央數衆從空而來住淨道上樓閣之中表白唱言一心奉請十方法界五嶽四瀆地載遊空福德諸神係祀靈廟并諸眷屬東嶽天齊仁聖帝五嶽聖帝五嶽佐命真君水府扶桑大帝四大海王四瀆源公水府諸神五方龍王四海九江五湖七澤諸龍王衆五方土君十二分野神君太歲已下諸土神君衆雷霆風雨火部熒惑行瘟行病監生行藥諸神衆百穀華果藥草園林旱蝗災荒所主諸神衆守護名山道場城邑舍宅舟車橋道所主諸神衆諸郡城隍列廟縣邑山川係祀神祠諸侯王衆施家所屬當境神祠住居六神家庭香火諸神衆中界功德司判官監齋使者地行捷疾使者惟願不迷本性承佛威光今夕今時來趨法會法師想福德諸神無央數衆從空而來住淨道上樓閣之中表白唱言一心奉請十於法界帝王后妃文武官僚儒宗賢哲仙道隱逸并諸眷屬四聖輪王三皇上聖五帝三王歷代聖君十方諸國歷代帝王正后元妃帝子王孫至聖文宣王十哲士子思孟子歷代儒宗皋夔稷契伊傅周召致君澤民歷代賢臣王公宰輔諸侯九卿百僚文武歷代名臣起教婆羅門仙十洲三島洞天福地諸神仙衆老子尹令列子莊子立言埀教歷代仙聖巢父許子伯夷叔齊不事王候歷代隱士未得道果僧尼未登仙品諸道流女冠衆文武官僚夫人命婦節婦烈女歷代女流惟願不迷本性承佛威光今夕今時來趨法會法師想帝王官僚儒宗仙道及出家四衆無央數衆從空而來住淨道上樓閣之中表白唱言一心奉請十方法界農民工商醫卜雜流貴賤男女十類人倫并諸眷屬成劫以來光音諸天下為人種諸男女衆四大洲八中洲五百小洲歷代貴賤男女東彝西戎南蠻北狄諸國歷代貴賤男女農工技術醫藥卜筮行商坐賈諸男女衆師巫左道遊手末作奉公吏卒諸男女衆倡優鬻色奴婢乞丐鰥寡孤獨諸男女衆忠孝仁義智信禮節務善人倫諸男女衆不忠不孝姦貪暴逆行惡人倫諸男女衆頑愚庸很微柔勞文明達十類諸人倫衆施家上世祖宗親眷歷劫怨讎至此得解脫衆惟願不迷本性承佛威光今夕今時來趨法會法師想諸男女無央數衆及施家祖宗親眷歷代怨讎從四方來住淨道上樓閣之中表白唱言一心奉請十方法界四類受生五趣所攝山間海底阿修羅衆并諸眷屬執持世界與天爭權化生天趣諸阿修羅天中降德居鄰日月胎生人趣諸阿修羅鬼道護法乘通入空卵生鬼趣諸阿修羅旦遊虗空暮歸水宿溼生旁生趣諸阿修羅須彌山北入海二萬一千由旬羅睺阿修羅衆須彌山北入海四萬二千由旬勇健阿修羅衆須彌山北入海八萬四千由旬華鬘阿修羅衆須彌山北入海十六萬八千由旬毗摩質多阿修羅衆衆相山中依地而住最劣一種阿修羅衆妙高山中常所住處空穴寶城阿修羅衆惟願不迷本性承佛威光今夕今時來趨法會法師想諸阿修羅無央數衆從四方來住淨道上樓閣之中表白唱言一心奉請十方法界𦦨口鬼王三品九類諸餓鬼衆橫死孤魂并諸眷屬起教𦦨口鬼王所領百千那由他恆河沙諸鬼衆飛行夜叉地行羅剎及夜叉羅剎女諸鬼衆食香食水食吐食血三十六種諸餓鬼衆閻浮地下五百由旬閻羅所領諸餓鬼衆鐵圍山間不覩日月酬償宿罪諸餓鬼衆多財上品勢力中品得失下品得棄者餓鬼衆少財上品大癭中品臭毛下品針毛諸餓鬼衆無財上品臭口中品針咽下品炬口諸餓鬼衆空中海邊山谷冢墓草木糞穢諸餓鬼衆三十六傷橫死夭亡孤魂滯魄諸餓鬼衆惟願不迷本性承佛威光今夕今時來趨法會法師想諸餓鬼無央數衆或從四方而來或從地下而至却住一面表白唱言一心奉請十方法界閻摩羅王十王王妹十八小王諸司主吏并諸眷屬地府閻摩羅王秦廣大王初江大王地府宋帝大王五官大王變成大王泰山大王平等大王都市大王轉輪大王王妹神女善惡二簿童子諸女吏衆當時同誓助治地獄十八臣佐諸小王衆地府洪伽噤王三十七位諸鬼王衆鐵圍山間惡毒鬼王三十四位諸鬼王衆主執文籍業鏡火珠勘問對驗諸司判官地府五道大神無常大鬼追亡魂使者地府功德司判官捷疾使者牛頭阿旁百萬獄卒惟願不迷本性承佛威光今夕今時來趨法會法師想地府諸王官吏無央數衆從地下來却住一面表白唱言一心奉請十方法界八熱八寒諸大地獄諸獨孤獄一切受苦囚徒并諸眷屬正住贍部洲下等活無間八熱地獄受苦囚徒八熱四門十六遊增一百二十八獄受苦囚徒邊住鏡圍山底頞浮陀等八寒地獄受苦囚徒十方阿鼻地獄十八地獄三十六獄一百八獄受苦囚徒鐵牀銅柱劒樹刀山灰河熱沙諸大地獄受苦囚徒火箭飛刀舌鋸牙啖眼銼首諸大地獄受苦囚徒空中水間山谷嚝野諸獨孤獄受苦囚徒泰山城隍當境祠廟者陰獄中受苦囚徒七趣之中方離中陰將入地獄諸幽冥衆諸地獄中已經釋放未得受生諸幽冥衆惟願不迷本性承佛威光今夕今時來趨法會法師想諸地獄囚徒無央數衆先承降赦已得自便今聞召命即皆來至却住一面表白唱言一心奉請十方法界正住鐵圍山間邊住遍五趣中鱗甲羽毛十類旁生并諸眷屬金翅鳥王師子象王摩竭大魚諸福德旁生衆神龍寶龜鳳凰麒鱗珍禽奇獸諸祥瑞旁生衆鸚鵡白鶴燕烏鳶雞鴈鵝鴨諸飛禽衆牛馬羊鹿虎狼豬犬猴兔貓鼠諸走獸衆蛟蜃鼉鱉蟲魚蝦蟹螺貝蚌蛤諸水族衆蚊蚋蚤蝨蠅虻蛆蟻蜉蝣蛣𧏙諸微類衆蚖蛇蝮蠍蜂蠆鴆毒蜈蚣壁鏡諸毒類衆鱗甲羽毛有足無足四足多足諸旁生衆梟咎狐毒蛔食服應休循十類諸旁生衆正住鐵圍山間大海洲渚邊住遍五趣中旁生衆惟願不迷本性承佛威光今夕今時來趨法會法師想諸旁生無央數衆從四方來皆復人形却住一面表白唱言一心奉請十方法界諸趣往來七七日內七返受生中陰趣衆并諸眷屬諸天類中報盡還來受中陰身一切衆生諸仙類中報盡還來受中陰身一切衆生諸人類中報盡還來受中陰身一切衆生諸福德神報盡還來受中陰身一切衆生諸阿修羅報盡還來受中陰身一切衆生諸餓鬼中報盡還來受中陰身一切衆生諸旁生中報盡還來受中陰身一切衆生諸地獄中報盡還來受中陰身一切衆生泥犂城中罪福二相巧風所吹中陰衆生四洲諸趣往來受生一十七種中陰衆生惟願不迷本性承佛威光今夕今時來趨法會法師想七趣中陰一切衆生無央數衆形如七歲小兒從四方來却住一面表白唱言上來召請下堂聖凡十位神靈無央數衆或幽或顯各不相知非仗密言安能畢集我佛如來有召請真言謹當宣誦唵什伐囉俱胝阿揭吒尾揭吒薩訶誦呪三遍畢動鈸法師想上來召請十位神靈無央數衆自餓鬼地獄旁生中陰四趣衆生雖各來集卻住一面未敢擅登淨道今聞真言召請承法力故盡復人形上升淨道住樓閣中表白唱言願因祕密來集道場施主虔誠至心作禮施主作禮城隍當境諸神雖於前福德神中通請而施家尚欲備見所屬城邑及住居諸神奉供名號故今隨筵設位以專請之表白唱言一心奉請杭州府城隍列廟九縣鄉坊係祀靈祠諸侯王衆并諸眷屬當府城隍錢塘縣并八縣城隍諸廟神衆杭州府主城隍之神以下隨所住居更換不必依此兩院皋陶士師城邑靈壇社令旗纛廟旗纛將軍諸神衆故吳越國主錢武肅王之神嗣王位諸神衆諸寺觀諸官衙十城門土地諸神諸巷五通祠堂神衆鎮海樓伍公之神施公之神吳山十廟神衆鹽橋三位蔣侯相公三聖巷劉李二王各廟神衆西湖嶽武穆王于忠肅公四賢祠天澤廟一切神衆助聖廟褚公之神同仁祠孫胡許三公覺苑寺三忠祠合城一切神衆錢塘江主潮神晉龍鋪廟葛相公廟江干一切神衆惟願不迷本性承佛威光今夕今時來趨法會若別州府隨宜改換法師想城隍諸廟神衆從四方來却住一面表白唱言一心奉請本寺所屬當境神祠伽藍住居六神山門奉事香火諸神神并諸眷屬本境梵村土地三夫人合廟神衆近境清芳亭廟朱橋廟陳百二十五相公廟一切神衆當境五道大神半天牧野神官諸部五通神衆一十八位護教伽藍本寺華光之神周宣靈王之神關王之神本寺主山神以主隨換不必依此住居中霤土地明王門丞戶尉東厨司命監齋使者神衆住居方隅太歲二十四道諸土神衆中庭力士屋上廣漢主泉神主單神主園林神主後廁神一切神衆本寺普同搭大墳小墓守護塋域諸神衆惟願不迷本性承佛威光今夕今時來趨法會若別寺院及在家