body:
  text: 宋四明東湖沙門志磐謹撰明古杭雲棲後學袾宏重訂先一日大衆沐浴更衣預戒衆人次日早起候明相現小食罷便行開啓法事不可延緩以致失時若在伽藍中施主宜先期預至行晨朝開啓法事法師領施主入道場次第上香法事衆動鐃鈸表白唱言至心歸命禮十方法界諸佛法僧大衆和云常住三寶表白執爐振鈴述淨三業偈呪每偈四句一鳴鼓鈸宜簡雅不宜繁俗法性湛然周法界甚深無量絶言詮自從一念失元明八萬塵勞俱作蔽此日修齊興普度肅清意地謹威儀仰憑密語為加持將俾自他還本淨我佛如來有淨三業真言謹當宣誦唵薩網婆縛薩婆達磨薩網婆縛述磨含網縛並亡可切述輸律切誦呪三遍候聲畢方動鐃鈸下去誦呪皆例此法師想自身及大衆施主外身內心皆悉清淨表白振鈴述安慰伽藍神偈呪十八神王承佛敕常於遍界護伽藍維茲清淨法王宮必有明神來宿衛此日虔興平等供法音交唱衆無譁仰憑密語為加持慰悅神心增勝力我佛如來有安慰諸神真言謹當宣誦南無三曼嚲丁可切沒䭾上南唵度嚕度嚕地尾娑訶誦呪三遍畢法衆動鈸法師想伽藍諸神咸皆慰喜永願守護或在族姓家表白振鈴誦安慰宅神偈呪若在伽藍中不用維此住居勤守土護安人物顯諸神威靈自用既無私訶禁不祥應有法此日虔興平等供聖凡俱會異常居仰憑密語為加持將使神心無畏恐我佛如來有安慰諸神真言謹當宣誦呪語如前誦呪三遍畢動鈸法師想住居六神咸皆慰喜常加守護族姓家用止此表白振鈴述然香偈呪此岸栴檀非別物元從清淨自心生若人能以一塵燒衆氣自然皆具足此日虔興平等供欲令法界普熏聞仰憑密語為加持將使施心咸遍達我佛如來有然香達信真言謹當宣誦唵什筏栗多上末儞平阿鉢羅句吒竹駕切蘇上破上二合囉上尼上毗迦知上虎𤙖呼今切二合誦呪三遍畢動鈸法師想此香雲普熏法界三寶前通達信心無不周遍表白上香白言經典所在即如來舍利之身法道能弘必大德僧伽之士惟茲一處具有三尊天人常起護持堂宇固應光潔今則將開勝會永異他時自非結界以加威何使修齊之如式恪遵至誥全䇿奇勳妙香熏馥於空中淨水灑清於地上凡曰方隅之所悉同城壘之堅雖密藉於真言實冥資於圓觀將見瓊林風動玉殿雲披懸寶蓋於層霄聳華臺於廣座千幢幡而交擁衆伎樂以旁羅惟茲淨想之所成是即靈山之未散既彰此用更召諸神冀肅靜於壇場俾驅除於魔障下文旋姓家用寂光為土固不外於凡居聖賢之人或有殊於族姓謂觀其身則根塵起穢及言其處則土石生埃由心中之因行無良故世間之果報若是今則將開勝會永異他時自非結界以加威何使修齊之如式恪遵至誥全䇿奇勳妙香熏馥於空中淨水灑清於地上凡曰方隅之所悉同城疊之堅雖密藉於真言實冥資於妙觀將見瓊林風動玉殿雲披懸寶蓋於層霄聳華臺於廣座千幢幡而交擁衆伎樂以旁羅惟茲淨想之所成是即靈山之未散既彰此用更召諸神冀肅靜於壇場俾驅除於魔障表白執爐振鈴召請諸聖結界一心奉請如來化現圓滿神通大穢迹金剛聖者并諸眷屬惟願不違本誓哀憫有情臨降道場護持結界大衆和香花請我今奉宣本尊真言願垂加護唵佛舌屈聿摩訶鉢囉恨那礙許勿汁勿醯摩尼微吉微摩那棲唵斫急那烏深暮屈聿𤙖𤙖呼今吽于今泮泮泮泮泮潑娑訶誦呪三遍畢動鼓鈸法師想聖者威儀無量眷屬降入道場正中面外而立唐太宗朝有人持此呪多驗朝廷以為惑衆禁抑不令誦遂敕藏本削除十字後有錢塘西湖菩提寺慧持沙門遇蜀中高德教授穢迹持法復得全呪誦及二年大有感驗能令杵升虗空隨意而往呪水治病無不愈者今世間傳多此加句全本與藏不同一心奉請大威德大忿怒甘露軍茶利等十大明王并諸眷屬惟願不違本誓哀憫有情臨降道場護持結界大衆和香華請我今奉宣本尊真言願垂加護唵戶盧戶盧底瑟吒底瑟吒盤陀盤陀阿那阿那阿密哩帝烏𤙖二合𭠒潑誦呪三遍畢動鈸法師想聖者威儀無量眷屬降入道場住立左邊一心奉請大梵天王帝釋天主護世四王天龍八部并諸眷屬惟願不違本誓哀憫有情臨降道場護持結界大衆和香花請我今奉宣普召請八部真言願垂加護唵薩婆提婆那伽阿去那唎莎訶誦呪三遍畢動鈸法師想天龍八部無量眷屬降入道場住立右邊一心奉請此一住處僧伽藍內護正法者福德大神并諸眷屬惟願不違本誓哀憫有情守衛道場護持結界大衆和香花請我今奉宣召請真言願垂加護唵步布哩迦哩哆哩怛他訝多耶誦呪三遍畢動鈸法師想伽藍諸神至道場門首住立兩邊族姓家當請此位一心奉請城隍當境諸廟侯王住居六神家庭香火并諸眷屬惟願不違本誓哀憫有情守衛道場護持結界大衆和香花請我今奉宣召請真言願垂加護唵步布哩迦哩哆哩怛他訝多耶誦呪三遍畢動鈸法師想城隍各廟住居六神至道場門首住立兩邊表白白言上來召請已荷光臨環衛道場如雲密布心進勇鋭咸起護持少俟須臾奉行結界法師想無量金剛天神八部及諸眷屬各嚴兵仗環列四方守護道場內外表白振鈴述偈白諸聖賢行結界法初結地方界恭白十方三寶衆明王穢迹衆威神梵王帝釋四天王八部天龍咸護念此日將修平等供要令此地異常居須憑神力為加持清淨光明同佛剎我今持誦吉利忿怒真言加持淨水散灑此地結地方界當願此地之下深百由旬如淨琉璃永無垢穢唵枳里枳里跋折羅跋折里部訥畔陀畔陀虎𤙖二合泮枳音吉𤙖呼今切泮音潑折音日表白兩手執盂滿盛井花水誦呪七遍訖以水周回灑地法師隨前言願想表白白言次結方隅界我今持誦金剛部心真言加持淨水散灑四方結方隅界當願此道場內周匝四方如金剛城牆堅固莫犯唵縛日囉二合地勒迦輕呼縛亡可切表白執水盂誦呪七遍訖以水灑道場四方法師隨前言願想表白白言三結虗空界我今持誦蘇悉地真言加持妙香熏馥空中結虗空界當願此空之上過百由旬香雲普覆如大寶蓋已上結界三呪並出蘇悉地經唵素悉地迦履入縛里嚲難那牟謨羅㰤曳入縛囉入縛囉畔馱畔馱上㰤火羅㰤那虎吽𭠒潑表白濃然香執爐誦呪七遍執爐周回道場熏於空中法師隨前言願想表白白言上來結界作法已成上下四方廣博嚴淨如諸佛剎有大光明堪奉聖人宜開法會願諸賢聖嚴護道場毋使邪魔有所干犯法師施主上香表白啓請大士白言恭聞聖觀自在於過去時始住初地值千光王如來為說廣大圓滿無礙大悲心大陀羅尼令與衆生作大利益是時大士一聞此呪頓超八地至今釋迦如來與諸菩薩普會補怛落迦山之時惟我大士躬對如來以大悲心說此章句流通世間無不蒙益當知此呪猶如妙藥名阿伽陀一切諸病無所不治是故誦此呪者三惡道業無所不壞諸佛國土無不得生功德巍巍莫可稱歎我等茲日受施主請開建道場修平等供先於此地普召諸神行結界法用為嚴淨是以復於此時恭請菩薩大士以真言力重加法水增益勝用廣大難思將使羣生舉蒙解脫一心奉請千手千眼大慈大悲觀世音自在菩薩摩訶薩三請惟願不違本誓哀憫有情降臨道場加持呪水大衆和香花請我今持誦聖觀自在菩薩所宣廣大圓滿無礙大悲心大陀羅尼願垂加護南無喝囉怛那哆囉夜㖿南無阿㖿婆盧羯帝爍鉢囉㖿菩提薩哆婆㖿摩訶薩哆婆㖿摩訶迦盧尼迦㖿唵薩皤囉罰曳數怛那怛寫南無悉吉利埵伊蒙阿利㖿婆盧吉帝室佛囉楞馱婆南無那囉謹墀醘唎摩訶皤哆沙咩羊鳴音薩婆阿他豆輸朋阿逝孕薩婆薩哆那摩婆薩哆藏本無此五字那摩婆伽摩罰特豆怛姪他唵阿婆盧醯盧迦帝迦羅帝夷醯唎摩訶菩提薩埵薩婆薩婆摩羅摩羅摩醯摩醯唎馱孕俱盧俱盧羯懞度盧度盧罰闍㖿帝摩訶罰闍㖿帝陀羅陀羅地唎尼室佛囉耶遮羅遮羅摩摩罰摩囉穆帝囇伊醯伊醯室那室那阿羅佛羅舍利罰沙罰嘇佛羅舍耶呼盧呼盧摩囉呼盧呼盧醯利娑囉娑囉悉利悉利蘇盧蘇盧菩提夜菩提夜菩䭾夜菩馱夜彌帝利夜那囉謹墀地唎瑟尼那波夜摩那娑婆訶悉陀夜娑婆訶摩訶悉陀夜娑婆訶悉陀喻藝室皤囉耶娑婆訶那囉謹墀娑婆訶摩囉那囉娑婆訶悉囉僧阿穆佉耶娑婆訶娑婆摩訶阿悉陀夜娑婆訶者吉囉阿悉陀夜娑婆訶波陀摩羯悉哆夜娑婆訶那囉謹墀皤伽囉耶娑婆訶摩婆利勝羯囉夜娑婆訶南無喝囉怛那哆囉夜㖿南無阿唎㖿婆盧吉帝爍皤囉夜娑婆訶唵藏本有此一字悉殿都漫哆囉鉢馱耶娑婆訶表白執水盂誦呪三遍法師想大士端處道場放眉間光入此水中以彰聖用此呪世間傳誦者失去六字今依大藏千手千眼大悲經録出庶使誦者呪語周足可期聖驗法師施主上香表白啓請毗盧遮那佛白言恭聞聖觀自在為諸大衆乞請釋迦世尊為說十方剎土一切毗盧遮那如來皆同一時各伸右手以摩清淨蓮華明王之頂同說不空大灌頂光真言若有過去十惡五逆四重諸罪聞此二三七遍經耳根者即得滅除若諸衆生具造惡業身壞命終墮諸惡趣以是真言加持土沙散其身上及以塔墓彼所亡者若在惡趣應時即得光明及身除諸罪報令所苦身生極樂國乃至菩提永不退墮我等茲日受施主請開建道場修平等供先於此地普召諸神行結界法用為嚴淨及為恭請聖觀自在以大悲心所說章句重加法水增益勝用是以復於此時專誠恭請十方毗盧遮那如來以灌頂光加持此水令使功能倍復增勝然後以此最勝法水遍灑道場及以內外是處非處若根若塵一灑一沾光明煥發當知此地即為淨土當知此日可轉法輪十方賢聖無不雲臨六道羣生無不奔赴大開法施普度迷流罄法界中咸蒙解脫一心奉請十方剎土一切毗盧遮那不空如來三請惟願不違本誓哀憫有情臨降道場加持呪水大衆和香花請我今持誦毗盧遮那如來所說不空大灌頂光真言願垂加護唵一㫊烏可切暮伽上廢無計切嚕者娜二摩訶畝陀能乙切囉麼抳擬三鉢頭麼二合入縛二合攞四跛囉二合襪嚲野𤙖五表白捧水盂誦呪七遍法師想十方如來環坐道場共放眉間玉毫光入此水中以彰聖用世人傳誦字句多不正今依藏中不空罥索經録出善本表白白言上來奉請諸佛菩薩明王諸天各以威神加被我輩誦持真言不違法則加持淨水有大力用即此法門圓顯三德是以如琉璃寶清淨光明無有染礙即法身德如如意珠雨一切寶無不具足即般若德如轉輪王所向自在無有礙即解脫德呪既三德水亦三德全呪是水全水是呪體用不二同一祕藏我今以此三德祕藏真言淨水散灑此地道場內外上天下地中土四方隨水所至皆成結界當願此處道場香華飲食一切供事承此力故一一出生無有限量舉行法事沙門大衆承此力故一一根塵無不清淨修齊施主承事之人承此力故一一身心無不光潔乃至遠及界外往來之人身衣不潔飲啖葷辛或故或誤輒入道場以呪力故化為清淨一切邪魔及闡提者非毀三寶好作留難以呪力故咸發道心若讚若謗皆得為緣如此觀心方名普度更憑衆等同誦真言散灑法水周行諸處表白舉大悲呪執水盂領衆前行處處散灑若道場外造食召請浴室及迎引經過諸處法師執手爐領施主後行復回道場表白白諸聖賢宣意旨表白大衆於道場左邊施主右邊宜各攝心拱聽設問法師正中立設問日吉時良開建法會肅恭齊法意在於何敢請施主及以大衆宜各諦聽今當為說法界聖凡水陸普度大齊勝會以此定名此名既立必有其義名義若正方是今宗何謂法界理常一故諸佛衆生性平等故何謂聖凡十事異故佛及三乘是名為聖六道羣生是名為凡事雖有十理常是一何謂水陸舉依報故六凡所依其處有三謂水陸空皆受報處今言水陸必攝於空又此二處其苦重故何謂普度無不度故六道雖殊俱解脫故何謂大齊以食施故若聖若凡無不供故何謂勝會以法施故六凡界中蒙勝益故名義既正其位何以謂上下堂各分十位位復開十總為二百包括殆盡是詳非略食有多寡隨施者意位無增損茲為定制今此立法勿令有疑如法非法兩者須知戒德高遠觀道幽微有一不如不名法師信三寶尊念六道苦如此發心是名施主進止有法梵音遠聞有一不如不名秉文善知節度有正有從如此合宜是名法衆結界護淨禁止無良有一不如不名道場香燈畢陳肴膳具備如此潔精是為供事敢告施主若彼若我宜當如法遠離諸過今者所作非是小緣上奉四聖下及六凡一時等供無不周遍檀風普熏於斯可見有能修此真法供養不緣於心不住於相不住相者忘情照理如斯行施功用莫比無能施者無受施人無中間物皆畢竟空施者受者及所施物莫不宛然即難思假非有非無非非有無雙亡雙照為絶待中如此法施盡未來際法界常融唯一三諦設問畢大衆出道場此結界處天神森布宜加敬畏須預囑一謹信淨人嚴為守護勿令雜人出入汙犯淨界大衆茶湯罷至門首發符行發符法事門首先設四符使位具茶湯鮮果財馬及別案列請書奏狀符牒關牒等訖衆動鐃鈸法師施主次第上香表白白言至心歸命請十方法界諸佛法僧衆和常住三寶表白執爐振鈴然香達信白言香從心生心由香達不居三際可遍十方雖法爾之如然亦施者之能致是故諸佛聞之而加護羣生於此以蒙熏欲期勝益之全彰更誦密言而助顯我佛如來有然香達信真言謹當宣誦唵什伐栗多摩你阿鉢羅句吒蘇破囉尼毗迦知虎𤙖誦呪三遍動鈸法師想此香雲遍滿法界一切聖賢悉皆覺知生歡喜心表白以先所呪水別分一器預置几上至此白言寶器晶熒靈泉演漾三加祕密一灑清涼即四座以光嚴遍十方而涓潔遠塵離垢感聖招賢允在茲時躬行斯道我佛如來有灑淨真言謹當宣誦唵伐什囉賒咩羊鳴音耶吽癹潑悉哩摩呬戲薩訶誦呪三遍動鈸表白持水散灑四座周回一處法師想水到處嚴淨光明即成結界表白振鈴白言伏聞覺皇憫焰口之徒初令奉斛梁帝感神僧之夢遂啓修齊雖偏標水陸之名實等供聖凡之衆所謂於三尊則加敬言羣品則興悲極上天下地以無遺何彼界此疆之有間凡居異趣咸示真修故茲託事於多儀必使成功於普度今則仰遵內教恭按靈科開法會以濟迷流固自專於主者扣帝閽而發大號正有賴於使乎爰恪意以奉迎冀聞呼而即至至心奉請神通自在威德難量四天捷疾持符使者并諸眷屬惟願不違本誓哀憫有情是日今時降臨法會大衆和香花請動鈸下皆例此至心奉請神通自在威德難量空行捷疾持符使者并諸眷屬惟願不違本誓哀憫有情是日今時降臨法會至心奉請神通自在威德難量地行捷疾持符使者并諸眷屬惟願不違本誓哀憫有情是日今時降臨法會至心奉請神通自在威德難量地府捷疾持符使者并諸眷屬惟願不違本誓哀憫有情是日今時降臨法會我佛如來有召請真言謹當宣誦唵步布哩迦哩哆哩怛他誐多耶誦呪三遍動鈸法師想使者各有百千眷屬從空而來依位而立表白振鈴少時讚德述意雲擁旌幢風行部曲倣佛九霄而下徘徊四座之間冀暫駐於光儀將委宣於悃恭惟四大使者自強不息得一以靈用之則行威而不猛霜襟默識既經緯於萬方玉趾遠騰載馳驅於億剎庸謹奉辭之職矧多專對之才惟妙闡於神通實善權於方便茲日有大國云云三寶具位姓名今月十五日恭就某處開建法界聖凡水陸普度大齊勝會專為答還心願上報四恩普度羣生俱蒙解脫敘意隨時改用然則聖凡異念幽顯殊途非藉使人何由遍達故於此際奉召諸神諒在聰明必能知委表白振鈴遍食白言是心作食全食為心以由體用不殊故得卷舒自在如是則六塵互遍三德常融微妙難思出生無盡用憑觀道密扶呪熏將善導於事儀俾圓成於法施我今持誦無量威德自在光明勝妙力陀羅尼加持法食悉令周遍曩謨薩嚩怛他引一㜸跢嚩路引枳吉帝二唵三三跋羅三跋羅吽引四大衆同誦呪七遍畢表白灑淨水於食上法師想此供食出生六塵種種妙供一時奉上無所乏少表白振鈴獻食白言戒香芬郁定水澄清明智慧燈具禪悅食因行之華初發實相之果已圓有能如是諦觀則為以法供養載宣密語用速至神少賜從容特垂歆享我佛如來有獻供養真言謹當宣誦唵誐誐牙曩三去婆去嚩嚩日羅二合斛誦呪三遍畢動鈸法師想此獻供事充足現前諸神降享莫不歡悅法師振鈴少時付囑使者聖凡體同迷悟心異今此修齊而致請或云赴感之不齊謂三寶諸天之居固一念而可格如六道羣生之類有屢呼而弗聞蓋惡業重者正苦留連及邪見多者自為障閡非賴使人之捷疾曷通施者之勤渠至若具奏牘以進梵王録情文而于帝釋符地府泰山之所主關城隍土境之諸神咸仰體於至慈即奉行於大赦推聖恩之曠蕩拔惡趣之拘囚悉使奔趨毋令退縮如是則天人修羅之黨鬼畜泥犁之儔藉此時津濟之功解億劫輪回之業大崇至化幸遇長緣冀益闡於聰明肯恪遵於付託不踰頃刻遍達緘封毋使有違自貽其咎佛國天宮之異處各謹攸司人寰地府之殊途分當其任昏昧弗知者勸之以道凶頑自用者攝之以威有請必來無一不至所有意旨具在符文別命披宣試垂采聽兩僧出前就使者座側分立依次讀牒文并獻狀先四天次空行次地行次地府二人相間作四番讀不可多人亂讀表白振鈴發遣符使白言不速而疾有感則通威容儼日出之光神足擬天行之健駕雲較而揚羽葆載馳載驅窮寶焰而徹風輪宜上宜下幸毋廢命須善為辭事有勞煩禮當攀送我佛如來有發遣真言謹當宣誦唵麼訝羅穆羯叉目誦呪三遍畢動鐃鈸取奏狀請書牒文等一處排列焚之表白振鈴奉送法師想四符使分領所委文字受命即行十方世界無不通達然後撤符使位大衆進點心至門首召請焚財馬文書須用淨紙與柴炭度火焚之切記不可用燈燭度火比聞冥府有蠟錢堆積守者云人間焚紙錢時多於燭上度火故油汙不可用堆積於此又不可用杖攪碎此等皆關涉有過宜囑未知者同用行之
