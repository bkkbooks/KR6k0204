body:
  text: 宋四明東湖沙門志磐謹撰明古杭雲棲後學袾宏重訂道場外設大黑牌上刻字云六道羣生受薦亡靈並序立於此又作小牌上刻下堂并隨筵共十四位今以一牌為式云四空四禪六欲諸天日月星天天曹聖衆餘倣此並作十六字此小牌列於大牌前奉迎淨道安設於小牌前法師大衆施主就東面側立表白設几案就西面立振鈴白言咨爾六凡同然一會孰分彼此何間親怨以繇資法力之提持故得體施懷之平等將趨盛席必習真儀所謂淨相對之根塵以至稟無作之歸戒當繇正轍可蹈大方宜端列於後先咸竦聞於誡飭法師想六道及亡靈等次第斑列於淨道之上猶如雲海表白振鈴宣偈呪為六道清淨三業維爾羣靈俱集會將親三寶作歸依身儀俱已獲莊嚴或曰未能清口意載假如來方便道為除三業衆愆尤祇於當念了真空六用一時俱寂靜我今奉為法界六道一切羣生普令清淨六根三業佛有真言謹當宣誦唵薩網婆縛薩婆達磨薩網婆縛述摩含網縛並亡可切述輸律切誦呪三遍畢動鐃鈸法師想六道羣生三業六根各獲清淨無有染礙法師施主為六道代上香表白振鈴宣偈為六道然香致敬維爾羣靈無始劫飄零六道未知歸幸哉今夕以何緣罄法界中蒙普度此際將親三寶衆先須虔爇一爐香以茲清供寓真誠願賜慈悲為納受我今奉為法界六道一切羣生然香達信佛有真言謹當宣誦唵什筏栗多上末你平阿鉢羅句吒竹駕切蘇上破上二合囉上尼上毗迦知上虎𤙖呼今切二合誦呪三遍畢動鈸法師想香雲海普熏三寶聖賢之前為六道羣生通達信心無不周遍表白振鈴宣偈為六道奉請三寶維爾羣靈咸在列肅清三業瑩無塵從茲欲入大乘門是必先投三寶境夙世已修須發習今身初學可為因將行勝法作歸依故此最初勤奉請至心歸命請盡虗空遍法界十方常住佛陀耶衆和并諸眷屬法師大衆施主率六道羣生同時作禮下並例此至心歸命請盡虗空遍法界十方常住達磨耶衆和并諸眷屬至心歸命請盡虗空遍法界十方常住僧伽耶衆和并諸眷屬表白白言我今奉為法界六道一切羣生召請三寶佛有真言講當宣誦南無三滿多母陀南唵烏佐鉢囉諦賀多諦薩縛怛多孽多俱舍冒地唵娑哩野沒哩布羅迦也薩訶誦呪三遍動鈸法師想三寶聖賢雲集座筵證明作法六道羣生翹跪合掌乞受歸戒是時法師設一高座面外而坐表白同大衆兩旁而坐施主諸人於大衆兩旁之後法師趺坐為六道說法起信法界六道一切羣靈當知此時所以得至法會者繇今施主為能開建普度大齊之故也然而問津此道須發信心心未能信於道何有言信心者如四明法師之言曰信一切法唯心本具全心發生此即指事理二造為所信也生無別理並繇本具信此事造繇理具也具無別具皆是緣生信此理具即事造也則知世間相常緣起理一既已了知事理不二更復當知色心互融是以法法周遍念念具足十方三世不雜剎那諸佛衆生皆名法界是為圓信互具互造之義也既能信一切法心具心造又復當知實無能造所造能具所具以即心是法即法是心能造所造能具所具皆悉當處唯是一心皆悉當處唯是一色唯心唯色對待斯亡妙觀照之無非三諦若其然者當處皆空一空一切空全體即假一假一切假二邊叵得一中一切中一心三觀照不縱橫三諦一境體非並別惟斯妙理誰不具之三世諸佛已證此一切衆生正迷此雖終日迷而終日不離乎此也誠能信此三諦之理聖凡體一便可信今日法施之會正以一體三寶為歸依處從初發心至於究竟皆此日信心之所成就也願六道含靈深信此言永為依據法師即席為六道說法歸依一體三寶法界六道含靈已能圓發大心得決定信今當為汝仰依聖教委釋一體三寶之相俾知聖凡同具次當正示觀心三寶之法俾知修性互融言三寶者如天台聖師之言曰佛未出世但有輪王十善之化而已自大聖初成正覺首為提謂長者開授三歸使之翻邪歸正為入聖之根本者也此三歸者通發一切戒品及諸出世善法故不同十善之舊法也言歸依者歸以反還為義反邪師而還事正師此歸於佛也反邪法而還修正法此歸於法也反九十五種外道而還從於三乘正行之侶者此歸於僧也依以憑為義憑心靈覺得出三界是依於佛也憑佛所說法得出三界是依於法也憑三乘之侶得出三界是依於僧也言三寶者此佛法僧可尊可重故名寶也而有事有理事者住持三寶也理者一體三寶也言住持者佛在世時樹王得道為佛寶說四諦法為法寶度五比丘為僧寶佛滅度後範金合土紙素丹青為佛寶黃卷赤牘三藏聖教為法寶剃髮染衣紹隆佛化為僧寶此三住世不絶故曰住持三寶然一切像即是真身經典所在是佛舍利今時凡僧亦能荷負正法為世福田是亦所歸之處也言一體者以實相慧覺了諸法非空非有亦空亦有雙亡雙照三智圓覺名為佛寶所覺法性之理三諦具足名為法寶如此覺慧與理事和合名為僧寶如上依於教法委釋一體三寶之相以為汝輩六道一切羣靈開發妙解今更為汝依於行法以正示觀心三寶之法故天台四明二師之言曰諦觀一念之心即空即假即中即是三寶如汝六道羣靈現前一念本具三諦在迷不覺是為法寶能覺三諦之智是為佛寶諦智相合是為僧寶諦理是性餘二是修汝輩本具性中三法雖迷不覺理本諦當名為法寶全性起修成三諦智則能覺悟名為佛寶此智與性相應和合名為僧寶更細推之三九開合恐繁不舉如是歸依三寶一切道法任運而生上至等覺尚須歸依何況地向以下二乘聖人尚須歸依何況六道凡夫我今為此專為汝等奉行歸依俾宿世善根之人繇此成熟都未發心之人於此投種當知汝輩本具一體三寶是能感之因諸佛已證一體三寶是能應之緣惟其感應之道不忒是以授受之義方成我今將唱歸依惟汝輩六道羣靈肅清三業翹跪座前一念勤求聽我言說我弟子某甲從於今身直至佛身歸依佛歸依法歸依僧現前大衆齊主與六道羣靈隨法師教同音三唱法師白言上來授汝三歸已竟更加三結令法圓滿我弟子某甲歸依佛竟歸依法竟歸依僧竟如前三唱從今以往稱佛為師唯願三寶哀憐攝受如前三唱衆和南無十方常住佛法僧法師為六道行大乘懺法白言汝等六道一切羣靈已能歸依三寶為佛弟子當更進求菩薩大乘戒法永為成佛之本但以汝輩無始而來經歷諸趣罪業重積能為遮障今為汝輩依大乘門行懺悔法俾身心光潔方堪納戒言懺悔者如天台聖師之言要須知懺悔名知懺悔處知懺悔法知懺悔位懺悔名者梵語懺摩此云悔過若般誠三寶悔過首罪是為知懺悔名也懺悔處者普賢觀經云若欲懺悔者端坐念實相我心自空罪福無主依此觀心知罪實相是懺悔處也懺悔法者有事有理理者正觀事者助道正觀者即觀法性法性者諸法實相也助道者身旋禮口讀誦心䇿觀正助合行是懺悔法也懺悔位者其義最長汝輩六道羣靈若造五逆十惡諸惡律儀念念作惡親近惡侶者是為地獄業因當得地獄趣報受極重苦曠劫莫脫若有深著五欲不義取財利己枉人癡呆無知者是為畜生業因當得畜生趣報更相殘害無能止息若有慳貪不施邪見諂曲破齊犯戒不信因果者是為餓鬼業因當得餓鬼趣報常時饑渴無繇一飽若有薄修福業常懷勝他我慢陵人多好爭訟是為修羅業因當得修羅趣報一日三時苦具自至此輩應須懺悔滅除業障若失慎守綱常竪持五戒是為人業因當得人趣報然人中有八苦而復多造種種不善死墮惡道如是等罪應須懺悔滅除業障至於行十善道修世禪定是為天業因當得天趣報然天中有五衰耽著欲樂而不修行福盡還墮甚有直從上界入地獄者應須懺悔滅除業障此外更有六道往來受中陰身隨業遷轉者更有值遇惡緣不盡天年遂至橫亡者更有強暴之鬼伺人之便興禍求食或復加害如是等類皆應共行懺悔滅除業障是為識懺悔位也如上且就六凡以論今明聖位當懺悔者藏通二教三乘聖人雖有析色體色入空之殊界內界外巧拙之異然同除四住同證偏空但離斷常中未聞佛性中是故應須懺悔滅除業障別教雖臻十向尚修中未能證中雖歷十地猶證中未免後障乃至等覺尚或未得無學是故應須懺悔滅除業障即如圓教十住至於等覺法身智斷猶未究盡喻同十四夜月是故亦須懺悔滅除業障從無間業上至圓教等覺位位皆有三障煩惱頭數結業流類苦報等差該互凡聖故五十校計經云齊至等覺皆令懺悔正此義也夫二死已亡三惑永斷唯佛一人自餘聖賢尚須懺悔況六道乎我今奉為六道一切羣靈依大乘經懺悔之法對三寶前發露懺悔行懺悔者身心清淨念念之中得見普賢菩薩及十方佛宜各至心隨我所說我某甲至心懺悔一切業障海皆從妄想生若欲懺悔者端坐念實相衆罪如霜露慧日能消除是故宜至心懺悔六情根法師三唱大衆同音率六道三和法師勸六道羣靈發菩提心汝輩六道羣靈無始至今中間於先佛世時得逢知識教令發心求菩提道者固亦多矣但以宿世煩惱障厚願行力微志不決定稍值惡緣隨即退失或生未聞佛法之處隨順世間種種惡法何繇能發菩提之心今茲何幸得逢施主開建普度大齊勝會已依大乘行懺悔法便當於此猛發菩提大心然菩提心當云何發何名菩提如天台聖師之言曰佛菩提心者從大悲起佛正行中此心為先欲求佛道先以大悲薰心乃至得果之後欲行化他者亦必以此大悲為之本也言菩提者如光明玄義言梵語菩提此翻為道菩提有三一曰真性菩提此以理為道也二曰實智菩提此以智慧為道也三曰方便菩提此以逗機會理為道也於是觀於不思議境依無作四諦立四弘誓起大悲心依苦諦誓度無邊之衆生依集諦誓斷無盡之煩惱此兩誓願下化衆生也起大慈心依道諦誓學無量法門依滅諦誓成無上佛道此兩誓願上求佛果也我今奉為六道羣靈依此妙義發四弘誓宜各至心隨我所說我某甲至心發願衆生無邊誓願度煩惱無盡誓願斷法門無量誓願學佛道無上誓願成法師三唱大衆同音率六道三和法師為六道說戒汝輩六道羣靈已能依大乘門懺悔發願今當至心進求戒法夫大乘三聚無作妙戒者度生死海之巨筏起重惡病之良醫證涅槃道之要門入諸佛位之正軌也諸佛出興志在敷化數化之方曰戒定慧然圓人所修一成一切成是故學戒即學定慧一心中學學無不遍矣言戒者禁止之義也言戒相者大乘三聚戒名出地持曰攝律儀者無惡不斷也曰攝善法者無善不修也曰攝衆生者無有情不度也今當更為汝輩克論所發戒體以為稟受故天台聖師之言曰戒體者不起而已起則性無作假色謂此戒體不起則已起則全性而性修交成心有無作假色假色者性必假色法以為表見也無作一發任運止惡任運行善不俟再作故云無作自非退菩提心更學邪法起上惡心造十重業未來他世雖在三惡道終不失戒若於後更受菩薩戒時不名新得名為開示瑩淨蓋謂重為開示其已聞之義瑩淨其已得之體而已至矣哉戒法之勝有如此者我今奉為汝輩六道奉行羯磨宜各至心諦聽作法法界六道一切羣靈諸佛子諦聽汝等今於我所求受一切菩薩學處一切菩薩淨戒所謂攝律儀戒攝善法戒饒益有情戒此諸學處此諸淨戒過去一切菩薩已受已學已解已行已成未來一切菩薩當受當學當解當行當成現在一切菩薩今受今學今解今行今成當來作佛汝等從今身至佛身於其中間不得犯能持否法師三說大衆率六道三和能持法師想六道羣靈各勤三業稟受淨戒即感一種善法流入身心是為所發無作善業之色此色微妙天眼可見此是初番羯磨已成十方世界妙善戒法繇心業力悉皆震動諸佛子諦聽汝等今於我所授一切菩薩學處云云同前至能持否此是第二番羯磨已成十方世界妙善戒法於虗空中如雲如蓋覆汝頂上諸佛子諦聽汝等今於我所授一切菩薩學處云云同前至能持否此是第三番羯磨已成十方世界妙善戒法從汝頂門流入身心充滿正報永為佛種上來已為汝輩六道諸佛子衆三宣羯磨傳授戒法作法既成是為得戒法師為六道說十重戒以為持護用心之法汝輩六道諸佛子衆既依憑三寶發無作戒親聞羯磨結成善業宜應自此堅固護持於一切處勿令有犯不為患難退轉其心不為塵境惑亂其志寧有戒死不無戒生縱其乘急戒緩以三塗身得值彌勒聞法度世何如持戒清淨解第一義以人天身而與龍華最初之會又何如具諸戒行三心圓發以此土身而升安養上品之位然則輪回永謝聖果可階莫不繇於此日稟戒護持之力也今當為汝宣揚梵網經心地品十重波羅夷以彰持犯之相切須善學敬心奉持第一殺戒佛言佛子若自殺教人殺方便殺讚歎殺見作隨喜乃至呪殺殺因殺緣殺法殺業乃至一切有命者不得故殺是菩薩應起常住慈悲心孝順心方便救護一切衆生而反自恣心快意殺生者是菩薩波羅夷罪第二盜戒若佛子自盜教人盜方便盜呪盜盜因盜緣盜法盜業乃至鬼神有主劫賊物一切財物一針一草不得故盜而菩薩應生佛性孝順心慈悲心常助一切人生福生樂而反更盜人財物者是菩薩波羅夷罪第三淫戒若佛子自淫教人淫乃至一切女人不得故淫淫因淫緣淫法淫業乃至畜生女諸天鬼神女及非道行淫而菩薩應生孝順心救護一切衆生淨法與人而反更起一切人淫不擇畜生乃至母女姊妹六親行淫無慈悲心者是菩薩波羅夷罪第四妄語戒若佛子自妄語教人妄語方便妄語妄語因妄語緣妄語法妄語業乃至不見言見見言不見身心妄語而菩薩常生正語正見亦生一切衆生正語正見而反更起一切衆生邪語邪見邪業者是菩薩波羅夷罪第五酤酒戒若佛子自酤酒教人酤酒酤酒因酤酒緣酤酒法酤酒業一切酒不得酤是酒起罪因緣而菩薩應生一切衆生明達之慧而反更生一切衆生顛倒之心者是菩薩波羅夷罪第六說四衆過戒若佛子口自說出家在家菩薩比丘比丘尼罪過教人說罪過罪過因罪過緣罪過法罪過業而菩薩聞外道惡人及二乘惡人說佛法中非法非律常生慈心教化是惡人輩令生大乘善信而菩薩反更自說佛法中罪過者是菩薩波羅夷罪第七自讚毀他戒若佛子自讚毀他亦教人自讚毀他毀他因毀他緣毀他法毀他業而菩薩應代一切衆生受加毀辱惡事向自己好事與他人若自揚己德隱他人好事令他人受毀者是菩薩波羅夷罪第八慳惜加毀戒若佛子自慳教人慳慳因慳緣慳法慳業而菩薩見一切貧窮人來乞者隨前人所須一切給與而菩薩以惡心瞋心乃至不施一錢一針一草有求法者不為說一句一偈一微塵許法而反更罵辱者是菩薩波羅夷罪第九瞋心不受悔戒若佛子自瞋教人瞋瞋因瞋緣瞋法瞋業而菩薩應生一切衆生善根無諍之事常生慈悲心孝順心而反更於一切衆生中乃至於非衆生中以惡口罵辱加以手打及以刀杖意猶不息前人求悔善言懺謝猶瞋不解者是菩薩波羅夷罪第十謗三寶戒若佛子自謗三寶教人謗三寶謗因謗緣謗法謗業而菩薩見外道及以惡人一言謗佛音聲如三百矛刺心況口自謗不生信心孝順心而反更助惡人邪見人謗者是菩薩波羅夷罪上來特為汝輩開示十重戒相應當奉持若能如是用心是為善行菩薩之道願行具足聖品可登故此奉勉切須敬謹法師下座撒席大衆施主並起兩邊側立法師上香歸就衆立念佛表白為六道念佛求加白言六道一切羣靈既獲淨戒當須敬禮大乘常住三寶一切聖賢始可前進參陪坐席我今奉為稱唱三寶洪名冀承威力用為加被南無本師釋迦牟尼佛南無阿彌陀佛南無彌勒佛南無大乘妙法蓮華經南無大方廣佛華嚴經南無大乘金光明經南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩以上各位三稱大衆率六道同音念佛表白右邊立執爐偈讚三寶至每位作禮以手爐揖引六道容顏甚奇妙光明照十方我適曾供養今復還親近聖主天中王迦陵頻伽聲哀憫衆生者我等今敬禮至心歸命禮見坐道場十方法界衆和一切諸佛至心歸命禮見坐道場十方法界衆和一切尊法至心歸命禮見坐道場十方法界衆和諸菩薩僧至心歸命禮見坐道場十方法界諸緣覺僧至心歸命禮見坐道場十方法界諸聲聞僧至心歸命禮見坐道場十方法界諸祖師僧至心歸命禮見坐道場十方法界五神通仙至心歸命禮見坐道場十方法界護法諸天至心歸命禮見坐道場十方法界諸大神王至心歸命禮見坐道場十方法界十大士衆法師於每作禮時想六道佛子各有無央數衆一時作禮奉迎六道佛子入道場內表白振鈴誦登壇呪白言既稟律儀斯為佛子爰即六凡之質獲依三寶之光一處傾誠俱時作禮大欣此遇滿慰茲懷將肅入於道場更密承於法力我佛如來有登壇真言謹當宣誦唵一弭綿婢切補攞鉢頭摩暮伽上二跛比沒切囉縒鎖囉三跛同上囉弭捨覩四矩嚕嚕五莎縛訶誦呪三遍畢動鈸大衆迎至道場周回行道畢表白振鈴獻座白言芥子納須彌之山毫端現寶王之剎是為不思議事何關有取著心茲維曹度之揚莫匪妙嚴之境不撥萬象豈外十虗維大衆之善來藉良緣而俱會尊卑有序遐邇無遺曲躬傴僂而趨依位從容而坐一念寂默百慮銷亡請俟移時當行修供我佛如來有相應坐位真言謹當宣誦唵㫊暮伽上一鉢頭摩遜娜二䭾囉䭾囉𤙌三漫拏𤙖誦呪三遍畢動鈸法師想六道佛子無量眷屬親承法力各得受座法師領施主大衆暫出道場進藥石仍令一誠恪人看守
