body:
  text: 宋四明東湖沙門志磐謹撰明古杭雲棲後學袾宏重訂法師入道場上香施主上香設拜表白振鈴獻香述偈建大寶爐開法供香風濃郁藹栴檀羣生無一不心聞於此悟明中道義我佛如來有然香真言謹當宣誦唵什伐栗多末儞阿鉢羅句吒蘇破囉尼毗迦知虎𤙖誦呪三遍畢動鐃鈸法師想香雲海充塞道場六道羣生熏聞開悟表白灑淨振鈴述偈湛湛靈泉盈寶器了知流出自心源只於當處悟真機遍灑法筵無不淨我佛如來有灑淨真言謹當宣誦唵伐什囉賒咩羊鳴音耶吽癹音潑悉哩摩呬音戲薩訶誦呪三遍畢動鐃鈸表白持水散灑座席悉令周遍法師想水至處几席之上光明嚴潔表白宣意旨白言六趣何多一時俱會繇憑佛力得預道場當悉徇於真規庶咸歆於淨供成茲法施藉彼信心敢布勤渠用彰發起讀意旨畢動鈸表白振鈴白言歸命十方三寶衆願垂神力為冥資我今具食誦真言遍彼六凡咸受供表白遍食白言夫一切諸法體是三德依正色心何所不具是以大周剎海小極一塵過現未來剎那一念此三德體則無乎不遍者也三德者何也法身般若解脫是為三各具常樂我淨是為德法身不獨法身必具般若解脫般若解脫互具亦爾圓人一心具此三德非縱非橫故喻之以圓伊遍一切處故目之以祕藏大矣哉其法性之總相者乎洪惟我釋迦牟尼如來宣說施食法門俾於一心持誦無量威德自在光明勝妙力陀羅尼加持一食出生無量周遍法界普興供養蓋此陀羅尼者即是三德祕藏此祕藏者具一切法故能於此流出無窮而未嘗有竭也夫威德自在者解脫德也光明者般若德也勝妙者法身德也力者三德之力用也陀羅尼者總持之稱也總持三德要在一心一心三德法爾而具然則一心即陀羅尼陀羅尼即是法食莫不皆以三德共為之體亦莫不以三德共為之用我今繇能了知三德祕藏具一切法一切諸法同三德體故能舉體起用作我現前所奉分段之食於一一食出生一切天須陀甘露味及歡喜丸醍醐酥酪一切美味莫不畢具於此一一味中亦復出生妙香寶華天衣瓔珞衆寶輦輿一切服用鐘磬金鐃笙簫角貝鼓樂絃歌一切妙音流泉浴池華果園林光明臺殿一切住處復於一一美味一一服用一一妙音一一住處彼彼出生如上六塵一切妙供無不周遍如帝網珠千光交映一珠趣多珠多珠趣一珠一多相攝彼彼互照然則一器之食至微至約而所以能有如是不思議用者以此一念即三德之全體故也我今奉為施主持此三德所熏六塵妙供普施法界無量羣生一時充足無所乏少雖彼衆生各得受用而我本無所與衆生本無所取所施之物亦本無有我及衆生亦無有相是為以空為觀者雖復無與無取無物無我無衆生而其施者受者及中間物莫不宛然歷歷可見是為以假為觀者於一心中了知施者受者及所施物非有非無三輪俱絶是為以中為觀者三觀圓照一念中得無後無前何思何慮作如是觀而行施者是為不住相施是諸衆生受此施時一一自然皆得禪悅法喜以故居天道則轉增勝福在人倫則頓悟真歸修羅調伏瞋心餓鬼咸獲飽滿畜類自得智慧地獄永脫拘囚即於此時咸悔業因進求出世當知適為汝輩歸依三寶奉行懺悔發菩提心立四弘誓示之以三聚淨戒顯之以三德妙體明白洞達更無餘蘊而又於此時加之以法食之益是法是食俱得為利則如天台之言曰譬如熏藥藥隨火勢入人身中患除方復法隨食入亦復如是或近或遠終破無明是皆上藉茲日法施之力以致若是我今奉宣無量威德自在光明勝妙力陀羅尼加持法食充遍法界成大功能如前所說仰憑法衆同音持誦曩謨薩𭌯怛他一引孽跢去聲嚩路引枳音吉帝二唵三三去聲跋羅三去聲跋羅吽四引大衆同音誦呪據焰口經施鬼衆食令誦七遍施婆羅門仙衆令誦二七遍供養三寶令誦三七遍今人施六道食者多誦至七十遍功用彌勝呪畢動鈸法師想一一食中出生甘露上味一切肴膳如前遍食文中六塵互遍彌滿法界依正諸法皆成妙供一時普施法界六道各得受用無不周遍表白振鈴施甘露水白言惟茲湛水出彼高源被以密言成斯甘露是為不死之神藥能滅至渴之焦心可使清涼普令饒益於此修營之食加乎灌沃之功既變化之有方則出生之無盡莫不屬饜諸趣暢悅羣情咸豁悟於己靈即頓增於法喜我佛如來有施甘露真言謹當宣誦南無素嚕皤耶怛多揭多耶怛你他唵素嚕素嚕鉢囉素嚕鉢囉素嚕莎訶大衆同音誦呪畢動鐃鈸表白持水遍灑四座供食及中間斛食法師想此法水繇呪力故即成上妙天甘露味散灑供食豈惟淨潔香美非世所有亦復出生種種肴膳無有限量於諸肴膳復能出生微妙五塵重重無盡周遍法界六道羣生各得受用表白振鈴稱四如來名白言佛言若有四衆常誦此真言及四如來名號加持飲食施諸餓鬼者受此食已悉得飽滿其行施者便能具足無量福德則同供養百千俱胝如來功德無別又言此真言法豈唯施鬼亦復施仙及以三寶引而伸之則知亦當施餘五趣則法界之義方顯我今專為稱唱四如來名以彰勝用南無多寶如來南無妙色身如來南無廣博身如來南無離怖畏如來大衆同音誦佛號各三遍法師想四如來各興慈念攝濟羣生能令現身現德圓滿色相具足恣意受食離諸怖畏表白振鈴依位獻供白言萬法之性無住故能卷歸一空六塵之體恆周故得舒出諸有是為全理而造莫匪繇心所生則知此食具遍十方允在茲時普熏羣品然既遇大王之珍膳當載聆吾佛之靈章豈唯享則多儀蓋是飽必須教均沾上味咸悟圓常庶因齊事之緣同成法施之會一心奉供十方法界四空四禪六欲諸天日月星天天曹列聖并諸眷屬惟願不迷本性承佛威光是夕今時受茲供養衆和香華獻動鐃鈸下去例此表白振鈴宣偈并述讚文世仰四空無色定四禪十八梵天倫惟茲欲界六天王五欲自娛無與比日月五星齊七政北辰北斗衆天星角亢列宿盡周天八萬四千災變者十二宮辰并六甲天曹賞罰衆天宮十方天道萬仙真於此一時俱奉供伏以窮無色頂仰極境之至高懷有漏心與長年而俱謝矧四禪乃屬於邪定而六欲不離於凡情雖從夙修十善而來寧免見感五衰之相至若耀千光於二道垂萬象於一天獨憐冠上之華萎豈覺空中之箭墜威權自在為上界宮府之真仙賞罰必行實下地人倫之司命念福力久而復失信死魔決矣難逃以權引實者固究竟於本原隨業受生者蓋一期之妄報雲隱峨峨之玉殿風揚燁燁之銖衣執妙華以遨遊味甘露而厭飫意常自逸樂且無央八萬劫終是空亡三千界悉從淪沒受形塵世尚知聞法得道之時趺足幽區何有離苦脫罪之處今則特開勝會普度迷流願因佛日之光來赴檀家之供親承法施豁悟性空勿眷戀於高穹即升騰於樂土衆和歸命頂禮常住三寶施主作禮表白唱言一心奉供十方法界五嶽四瀆地載遊空福德諸神係祀靈祠并諸眷屬惟願不迷本性承佛威光今夕今時受茲供養表白振鈴宣偈讚文五嶽聖君同佐命扶桑水府萬仙真江河淮濟衆龍神四大海王諸眷屬華果園林并百穀旱蝗災病衆神司五方分野土神君風雨雷霆熒惑類天下城隍諸廟食立功施法錫廟封十方福德衆威神於此一時俱奉供伏以尊形山嶽巨鎮稱尊奉職雷霆至靈可仰穀果園林之所主水火風雨之攸司居海澤之龍君守方隅之土府城隍列廟里域叢祠定國安民著元勳於史冊禦災捍患結盛德於人心擅王侯徽美之稱顯天地神明之用洞陰陽而有序信賞罰以必行既助化於昌時宜垂名於常祀謂善權則暫同諸事言實報則正墮邪思故知血食以傷生未若齊心而潔己其或多貪徒屬廣闢殿堂妄作殃祥自昭威勇真常素昧竟莫識於依歸惡習彌增將速趨於淪墜今則特開勝會普度迷流願因佛日之光來赴檀家之供親承法施豁悟性空勿眷戀於塵寰即升騰於樂土衆和歸命頂禮常住三寶施主作禮表白唱言一心奉供十方法界帝王后妃文武官僚孔聖儒宗仙人隱士并諸眷屬惟願不迷本性承佛威光是夕今時受茲供養表白振鈴述偈讚文四聖輪王并列國帝王正后及元妃三公卿士衆名賢凡曰百僚文與武至聖大儒尊孔道四科十哲顯儒宗婆羅門衆即仙人此土老莊仙聖者巢父許由諸逸士夫人命婦及封君十方諸國衆君臣於此一時俱奉供伏以聖王間出御金銀銅鐵之輪明主迭興握社稷山河之柄開基立極繼體守文舉六合以為家統黎元而作子然而君無良則喪位臣不密則失身若此至難可不自畏維持世道景仰儒宗正心誠意以發其幾制禮作樂以崇其化公卿百辟具經國之賢材將校六軍蘊安邊之英略逸民隱士仙人羽流挺出塵絶俗之標得定命延生之術維后妃夫人之衆及嬪妄烈女之倫內則之行後庭中饋之助私室或出或處報暫見於兩端若智若愚竟同歸於一死今則特開勝會普度迷流願承佛日之光來赴檀家之供親聞妙法頓悟真空勿留滯於塵寰即升騰於樂土衆和歸命頂禮常住三寶施主作禮表白唱言一心奉供十方法界農民工商醫卜雜流貴賤男女十類人倫并諸眷屬惟願不迷本性承佛威光今夕今時受茲供養表白振鈴宣偈讚文十類人倫隨十習頑愚明達各分朋服田力穡百工人坐賈行商醫卜者事上奉公諸吏卒至於奴婢及倡優惟忠惟孝固無慚不義不仁宜見罰貧富繇天皆分定窮通有命豈人為十方人道衆無央於此一時俱奉供伏以自天降種故並列於三才得人為身繇宿持於五戒豈惟有學道之分要知具成佛之緣至於忠孝克修姦貪莫化皆性習之相遠致善惡之不同士農工商之稱四民頑愚明達之分十類惟醫藥卜筮之輩及技術倡優之待男女各得其朋尊卑不失其序名教內地莫匪衣冠之家遠近外固多朴直之行壽夭窮通其報若是鰥寡孤獨此苦何言只知蹈生死之輪寧能入聖賢之域元明外照竟背失其本心雜業交傾將飄零於異趣今則特開勝會普度迷流願因佛日之光來赴檀家之供親承法施豁悟性空勿眷戀於殘軀即升騰於樂土衆和歸命頂禮常住三寶施主作禮表白唱言一心奉供十方法界四類受生五趣所攝山間海底阿修羅衆并諸眷屬惟願不迷本性承佛威光是夕今時受茲供養表白振鈴宣偈讚文惟此化生天所攝執持世界與天爭居鄰日月是胎生護法乘通同鬼趣旦在虗空歸水宿信知此類比旁生四生五趣攝還周北住須彌深入海衆相山中為一種號稱最劣少威神阿修羅道衆無央於此一時俱奉供伏以宿修十善但成下品之因區別四生遂感陋心之果專行利己多為勝他福雖強而報本非天形極巨而手能障日處衆相山中其威或劣住大醎水底所入最深寶網雕欄映行樹參差之影奇華名苑出衆禽和雅之音居宮燒則來苦具於三時御飲食則變青泥於一口是為惡趣所攝蓋因邪見之堅其有聞悅意女言而遽爾興瞋共帝釋天戰而終焉致敗逃身入藕竅想多慚色取月為耳璫只成慢辭但念不臧豈明無諍長懷暴戾將鬼畜之為儔都無慈心何人天之有望今則特開勝會普度迷流願因佛日之光來赴檀家之供親承法施豁悟性空勿眷戀於殘軀得升騰於樂土衆和歸命頂禮常住三寶施主作禮表白唱言一心奉供十方法界𦦨口鬼王三品九類諸餓鬼衆橫死孤魂并諸眷屬惟願不迷本性承佛威光是夕今時受茲供養表白振鈴宣偈讚文諸餓鬼中名𦦨口以權引實故稱王財分三品豈無因業報千差於此見食血食香非一類依山依水即為名閻浮地下閉幽區或處鐵圍償宿罪別有夜叉羅剎鬼至於橫死衆傷亡十方餓鬼及孤魂於此一時俱奉供伏以習慳貪之業既非吉人感醜陋之形乃名餓鬼是以咽垂大癭腹聳高山足比枯柴面同惡獸火炬長然於口針毛每刺其身豈惟痛苦難言抑亦饑虗莫告閻浮提地下之正住斫迦羅山間之別居凡丘陵草木空荒之鄉及城邑街衢憒鬧之處固多此類得脫何時不善用心墓下鞭尸而奚益尚知活命人中求食以為謀至於被焚被溺之喪生自刎自經之害體凡茲短折悉是傷亡孤魂渺渺以無依長夜漫漫而未旦唱言水水此鬼城內那得有之䆿語刀刀我王庫中無如是者今則特開勝會普度迷流願因佛日之光來赴檀家之供親承法施豁悟性空勿留滯於幽區即升騰於樂土衆和歸命頂禮常住三寶施主作禮表白唱言一心奉供十方法界閻摩羅王地府十王王妹神女諸司官吏并諸眷屬惟願不迷本性承佛威光是夕今時受茲供養表白振鈴宣偈讚文信矣十王居地下閻摩羅號最稱尊惟茲神妹亦分權善惡二童諸女吏十八大臣曾立誓同為治獄報初心洪伽噤等固威雄惡毒鬼儔咸佐理業鏡火珠常鑑照諸司典執本公平十方地府衆神司於此一時俱奉供伏以善心初發上天之寶殿先成惡念才萌下地之火城已具故知現起之業行可卜未來之報緣惟閻摩羅之至神住捺落迦之冥界列華池於四處懸鈴網於七重衆鳥和鳴香風芬郁苦俱樂而間受兄與妹以雙王因本無良從極瞋而立邪誓果還自熟撲熱鐵而灌融銅矧十八之大臣及百萬之精卒繇當時有奉助治罪之願致此日得各任典司之稱所謂掌廳案之判官與彼執文籍之童子推鞫對驗固無枉濫燒然凍冽曷不辛酸非諸神可專其權實衆生自感之力久纏妄習徒令曠劫拘囚欲反真修不出一心照了今則特開勝會普度迷流幸因佛日之光來赴檀家之供親承法施豁悟性空勿留滯於幽都即升騰於樂土衆和歸命頂禮常住三寶施主作禮表白唱言一心奉供十方法界八熱八寒諸大地獄諸獨孤獄受苦囚徒并諸眷屬惟願不迷本性承佛威光是夕今時受茲供養表白振鈴宣偈讚文八熱正居南贍部四門十六號遊增須知邊住鐵圍山此是八寒諸獄處劍樹刀山殃自受鐵丸銅汁苦難逃維茲惡逆大阿鼻無數劫來無解脫別有泰山孤獨獄城隍祠廟管新亡十方地獄衆囚徒於此一時俱奉供伏以非毀三寶曾無歸敬之誠違逆二親罔念生成之本其或六根圓造至於一業單行過之微者責亦微罪之大者罰斯大是心所作自我之招如夜書火滅而字存若曉鑑形臨而影見極熱極寒之異熟惡因惡果之相成斫迦羅兩山間日月神天不照閻浮提八獄下鐵銅石火交陳風吹劍樹則舉體刺傷湯涌灰河則全身糜爛既受斫於斤斧復被齧於豺狼捺落迦謂之惡人閻摩羅訶為獄種至若曠野獨孤之處蓋從別業輕薄而言繇不明自性之真空故莫免此時之妄報遙遙長劫何知得脫之期渺渺沈魂誰反在迷之念今則特開勝會普度囚徒願因佛日之光得赴檀家之供親聞妙法頓悟圓乘勿再入於陰區即升騰於樂土衆和歸命頂禮常住三寶施主作禮表白唱言一心奉供十方法界鐵圍山間遍五趣中鱗甲羽毛十類旁生并諸眷屬惟願不迷本性承佛威光是夕今時受茲供養表白振鈴宣偈讚文師子象王昭福德龜龍麟鳳應休祥烏鳶燕是飛禽牛馬犬羊為走獸鼉鱉魚蝦名水族蚊虻蠅蟻最微生蚖蛇蜂䘍毒心強鱗甲羽毛隨業受正住鐵圍并海渚邊居五趣悉周遭十方十類衆旁生於此一時俱奉供伏以稟愚癡之性正見全乖受陋劣之形旁生是號水陸空之居異魚鳥獸之羣分胎卵溼化之四生休咎服循之十類鳳鳴而昭祥瑞鵬集則表凶衰吞鉤之餌見其多貪赴火之明憐其罔覺具先知之智豈復免於刳腸有負重之功亦終歸於解體以大制小則遞相食啖隨業論對則更互酬償慨此輩之交傾當何時而得止至若張羅布網以夭其命發機設穽以傷其生方血汙於刀砧竟身糜於鼎鑊長懷極苦牢結深怨以茲自己之脂膏飫彼不仁之口腹如斯酷罰非為橫報之相加驗以前因實是惡修之所致今則特開勝會普度迷流願因佛日之光得赴檀家之供親承法施豁悟性空勿眷戀於殘軀即升騰於樂土衆和歸命頂禮常住三寶施主作禮表白唱言一心奉供十方法界七七日內七返受生諸趣往來中陰趣衆并諸眷屬惟願不迷本性承佛威光是夕今時受茲供養表白振鈴言偈讚文補特伽羅為數取生經七日太匆匆如斯七七日才終決定受生隨業轉七趣往來無暫止四洲經歷莫遑居略為十七種名言此類只憑天眼見別有泥犂分罪福隨心感得巧風吹惟茲中陰衆無央於此一時俱奉供伏以從緣隱顯若鏡像之有無隨業升沈如井輪之高下惟天上五衰之至及人間四相之遷三塗之出沒紛紜諸趣之往來雜遝善惡極重者即能感報果因稍輕者且復俟時以未得於受身故暫歸於中陰何死生之數取繇罪福之轉移倏忽而終壽量定於七日變化而有質狀比於小兒念念不臧形形相續識雖聰利性只昏𫎇不離萬法之中強名六道之外在天眼固應得見非佛心莫能遍知若此無歸誠為可憫周流妄境以隨情正爾牽連回入修門至得道方為止息今則特開勝會普度迷倫願因佛日之光來赴檀家之供親承法施頓悟圓乘勿眷戀於殘軀即升騰於樂土衆和歸命頂禮常住三寶施主作禮表白宣呪獻供我佛如來有獻供養真言謹當宣誦唵誐誐曩三婆嚩縛日囉斛誦呪三遍畢動鐃鈸法師想下堂十位聖凡承茲法力咸得受供表白白言願因祕密不思議熏悉使微肴轉成法供施諸六道十位羣靈一時普資無不周遍施主作禮表白唱言一心奉供府城隍列廟縣鄉坊係祀靈祠諸侯王衆并諸眷屬惟願不迷本性承佛威光今夕今時受茲供養表白振鈴宣偈讚文當府城隍靈佑廟巍巍府主顯威神祥刑自古祀皋陶德於茲封列廟粵有明王諸往哲郡樓旗纛大將軍惟斯賢聖邑中尊赫爾海神居廟食寺觀官衙諸土主至於諸巷五通神匝城屬縣衆靈祠於此一時俱奉供伏以虹梁壓水據上下之要津雉堞齊雲壯東南之會府峩峩官宇比比民居必有真靈共為庇蔭是以城隍列廟里邑叢祠咸顯諸神克亨厥祀豐特立既昭示於褎封邃殿宏開用奉嚴於真像莫不立功施法助國安人將俯答於祈禳必大彰於威烈凡兵戈厄難之際及水旱疾疫之時一有所求罔不為應但歆血食曾未免於傷生都無慈心竟何思於責報今則特開勝會普濟羣倫願因佛日之光來赴檀家之供親聞妙法頓悟圓乘勿眷戀於塵寰即升騰於樂土衆和歸命頂禮常住三寶施主作禮表白唱言一心奉供近邑當境諸廟侯王住居六神家庭香火并諸眷屬惟願不迷本性承佛威光是夕今時受茲供養表白振鈴宣偈讚文近邑侯王諸廟食至於當境衆神明住居中霤大明王門戶諸神并主竈守井守庭俱奉職牀公牀母廁夫人方隅太歲土司神服事家庭香火衆莊庫所居并店肆田山蔬圃及墳塋維茲福德衆神靈於此一時俱奉供伏以闡至靈而護物大庇鄉閭昭明信以事神聿修廟祀念聚廬而託處知中霤之稱尊守禁忌於方隅謹出入於門戶竈專飲食之用井備水泉之需臥牀保以常安奏廁賴其密佑親承佛囑莫妄擾於人居無作神羞冀默扶於世福至若家庭之立像位冢墓之有地祇田山界畔之相分倉庫積儲之甚盛凡茲處所悉有典司如其清正則但受香燈或復姦貪則恣求血肉此之惡習難以盡言是權施則行在利他若實報則業招自我夙稟聰明之智未免邪思不知常住之心焉求覺慧今則特開勝會普度迷流願因佛日之光來赴檀家之供大沾法施豁悟性空勿留滯於塵寰即升騰於樂土衆和歸命頂禮常住三寶施主作禮表白唱言一心奉供本家上世祖禰亡靈師友親眷諸位神儀并諸眷屬惟願不迷本性承佛威光是夕今時受茲供養表白振鈴宣偈讚文天地既分人道立最初得姓是為先洪惟始祖及高曾逮我二親咸薦福若或見存資福壽如其已逝必超升至於伯叔與諸姑兄友弟恭無不度師友外親諸母氏等今披濟不遐遺世間男女盡吾親於此一時俱奉供伏以自宗祧之陰隲故能垂裕於後昆繇梵福以冥熏是曰追榮於上世然則奉先思孝莫如崇德報功故夫近從高曾逮及父母已遷神於昭代或侍養於餘年懷正見則再返人中造重愆則竟淪下地縱耽天樂尚何免於五衰別證仙身亦還來於諸趣事戰爭而興大忿逐飛走以作旁行靈風肅肅知其為神饑火炎炎謂之曰鬼出沒四生之境罔念超際回旋六道之輪何當止息其有勤修至行深會圓乘想密契於無生必高登於上品盡大地莫非親眷等成濟之緣歷曠劫所有怨讎悉動解除之念今則特開勝會普度迷流願因佛日之光來赴檀家之供欣聞妙法豁悟真空勿留滯於塵寰即升騰於樂土衆和歸命頂禮常住三寶施主作禮表白唱言一心奉供受薦某人神儀惟願不迷本性承佛威光是夕今時受茲供養施主作禮表白宣呪獻供我佛如來有獻供養真言謹當宣誦唵誐誐曩三婆嚩嚩日囉斛誦呪三遍畢動鐃鈸法師想隨筵神衆及亡靈等承茲法力咸得受供表白白言願因祕密不思議熏悉使微肴轉成妙供施諸神衆及以亡靈一時普資無不周遍表白振鈴獻六種供養白言慧燈散夜月之輝定水湛秋空之色華嚴萬行果滿一乘入此室者唯聞諸佛功德之香作是觀者但見禪悅法喜之食莫不即事即理唯色唯心悉會正宗全成妙供我佛如來有普供養真言謹當宣誦唵阿㰤囉阿㰤囉薩縛苾地耶䭾囉布爾底莎縛訶誦呪三遍畢動鈸法師想法界六道一切羣生及隨筵神衆諸亡靈等承茲法力咸得受此六種妙供悉皆周足表白振鈴修法供養白言備行齊法悉入教門要識事為全歸理趣是以發心措意屈膝低頭燒香散華然燈奉食莫不資成於圓觀咸令助顯於正因以如儀雖有多端若隨智無非三諦然則欲知斯道豈外此宗達萬法性相皆空即一念思惟如實更須誦聖人所說之典俾克符自己得解之靈悟修行處於是為真示供養中以茲為勝我佛如來有法供養真言謹當宣誦唵薩婆怛他揭多悟呬音戲耶摩訶鉢哩鉢底布闍瞑伽三慕達羅窣癹羅拏三末曳平𤙖誦呪三遍畢動鈸法師當知前來所奉一一供事並是財施今誦大乘乃是法施財以養命惟資福業法以開性是為智度二施並運方名溥濟之道況前財施皆有慧觀方便以體道之則知一一供事無非法施財外無法法外無財二施平等皆即三諦作此想時六道羣生咸蒙法喜各得解脫表白舉經或呪大衆旋繞誦畢宣偈回向不必繁辭願以此功德普及於一切我等與衆生皆共成佛道衆動鐃鈸請法師升座說法要
