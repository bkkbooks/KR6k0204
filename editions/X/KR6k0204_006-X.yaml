body:
  text: 宋四明東湖沙門志磐謹撰明古杭雲棲後學袾宏重訂法師面道場升座為六道開說法要指歸淨土令修念佛三昧求願徃生汝輩六道佛子自入道場屢聞法要所謂發起圓常正信歸依一體三寶行大乘懺悔立四弘誓願而又獲聞大乘妙戒無作之法乃至一香一華明燈奉食幢旛瓔珞歌頌讚歎六塵供事互徧莊嚴一一無非備明法華開顯之事究竟圓融三諦之理將使汝輩開發妙解達茲萬境唯是一心諦觀一心本不可得隨心而造不礙緣生若依若正若色若心妙觀觀之無非妙法然而此土濁惡障重機疏縱有進修難於成辦仰荷如來有異方便曰觀佛三昧俾於阿彌陀佛極樂淨土專心繫念遂得往生我釋迦世尊於此娑婆世界曰極苦穢土以折之故其地泥沙荊棘惡道充滿其時寒暑晝夜推遷無常其人胞胎受生男女雜沓其衣食幸勤造作麤惡分段但增業障其壽命短促朝暮不測示如是種種諸苦教人起心生大厭惡於彼佛世界曰極樂淨土以攝之其地寶池瓊苑無三惡道清淨光明其時無寒暑晝夜其人蓮華化生純丈夫相其衣食隨念而至珍奇美妙惟成法喜其壽命同於彼佛久長無量示如是種種樂事教人起心生大欣慕故世尊因韋提希發起為說十六妙觀以為求生之要先觀落日者所以標想西方而令向彼佛也良繇此能想心本具一切依正之法今以具日之心想於即心之日令本性日顯現其前惟心與日皆是法界作是觀者名日觀成也日觀既爾餘觀例然次觀水觀地觀樹觀池及以總觀凡此六觀皆觀彼土之依報也次觀座觀像觀佛觀二菩薩普觀雜觀凡此七觀皆觀彼土之正報也次三觀者觀三輩九品往生令其舍劣而取勝也又經云是心作佛是心是佛言作佛者顯佛從修非是自然全是而作全性成修故曰心作也言是佛者顯佛本自具非從修得全作而是全修成性故曰心是也汝輩六道羣靈解此妙義應當依法用觀修此三昧是則繇三昧力繇佛攝受力繇本有功德力會三力於一時收成功於一念便可不離當處坐寶蓮華不逾剎那往生彼國即心念佛慕果修因祖有誠言可弗努力我今奉為六道佛子皆同一心稱佛名號求生淨生願佛慈悲特垂攝濟補後學雲棲袾宏上來所說觀想念佛三昧已竟今當更說持名念佛三昧竊惟淨土之為教也肇始於釋迦世尊闡揚於歷代賢聖於是以念佛一門而分四種曰持名念佛曰觀像念佛曰觀想念佛曰實相念佛雖有四種之殊究竟歸於實相而已又以前三約之為二一為觀想一為持名觀想則十六觀經言之詳矣此論持名則阿彌陀經云聞說阿彌陀佛執持名號若一日二日乃至七日一心不亂其人臨命終時阿彌陀佛與諸聖眾見在其前是人終時心不顛倒即得往生阿彌陀佛極樂國土此萬世持名念佛從出之大原乃金口所親宣之妙法也古德云觀法理微眾生心雜雜心修觀觀想難成大聖悲憐直勸專持名號良繇稱名易故相續即生此闡揚持名念佛之功最為往生淨土之要若其持名深達實相則與妙觀同功上上品生當不疑矣現前諸佛子如前懺悔門中二乘聖人圓心大士乃至等覺尚須懺悔既彼均當懺悔豈不咸應往生而況位在凡夫生居學地者乎我今奉為六道見前諸佛子等皆同一心稱佛名號求生淨土願佛慈悲特垂攝濟法師同大眾及六道佛子同音稱唱西方佛菩薩號行十念法法師想六道佛子聞法之故心開意解皆同念佛求願徃生阿彌陀佛及諸大士以慈威力而攝取之即使六道念佛眾生頃刻間乘寶華臺得生彼國表白為施主推廣施心發度生願白言靖惟十方所有羣品雖地居文物之盛及人多佛法之傳六根闇蔽者則所不知五苦沈淪者於茲弗覺況遐方遠地之處有愚人聾啞之徒但求自謀衣食之常饒豈聞普度水陸之為益至於貧窮困滯疾病縈纏在牢獄以被囚處卑小而受制雖存慕仰何得修營既自棄於良緣亦焉蒙於善利茲因齋會特發施懷率六趣之迷倫陳一心之弘誓若疑若信或自或他咸慰滿於所期俾圓成於斯願表白為施主代為六道羣生不曾歸依三寶等者勸陳十願修齋功德一分奉為法界六道一切羣生下去例稱此句不曾歸依佛法僧者代伸歸依當願三寶慈光常垂加護不曾禮讚佛法僧者付伸禮讚當願三寶慈光常垂護念不曾供養佛法僧者代伸供養當願三寶慈光常垂攝受不曾懺悔三世重罪者代伸懺悔當願一切業障即得清淨不曾勸請諸佛住世者代伸勸請當願轉妙法輪普利法界不曾隨喜修行大乘者代伸修行當願若自若他圓成行願不曾迴向勤求佛道者代伸迴向當願普與羣生同入佛智不曾發龍上求下化者代伸發願當願佛道圓成眾生普度不曾念佛求生淨土者代為求生當願早托蓮胎華開見佛不曾發心求菩提道者代為發心當願一向圓修即成究竟上來奉為罪障深重不聞三寶法界羣生勸陳十願用結勝緣植菩提因期心果覺表白為施主代為七趣十類羣生各悔業因進求解脫勸發十願修齋功德一分奉施十方法界下去例稱此句諸天道中著樂無厭五衰忽至一切眾生當願進慕真常早蒙解脫諸仙道中抗志虗無保守幻質一切眾生當願進學無生早蒙解脫諸福德神典司陰陽興災降福一切眾生當願進慕真修早蒙解脫諸人倫中求名貪利汩沒風塵一切眾生當願進學大乘早蒙解脫諸脩羅中好行瞋恚鬬戰不已一切眾生當願息諍興慈早蒙解脫諸餓鬼中饑渴逼切歷劫受苦一切眾生當願渴惱蠲除早蒙解脫地府主吏記注生死判決獄囚一切眾生當願執法寬慈早蒙解脫諸地獄中有間無間歷劫受苦一切眾生當願罪性本空早蒙解脫諸旁生中遞相吞啖刀砧受死一切眾生當願怨業頓空早蒙解脫諸中陰中七趣往來數取生死一切眾生當願不昧己靈早蒙解脫上來修齋無量功德回施七趣十類羣生殷勤勸發十種大願咸被鴻恩圓成施度表白為施主代為法界君臣民庶貴賤男女各悔業因進求解脫發四十八願修齋功德一分奉施十方法界下去例稱此句中華正統邊方遠國有道無道一切君王當願慈念蒼生德化天下正后元妃夫人采女承事宮掖一切女貴當願母儀四方柔道奉上儲宮藩國帝子王孫男女長幼一切貴眷當願事上以忠長守富貴輔君治國宣化牧民居中在外一切官僚當願忠恕存誠安人濟物親提師旅統制邊方為國忘軀一切將士當願軍政修明四維畏服䇿名為臣遭讒被逐或罹非命一切官僚當願事迹彰明得全忠節行師失律干犯軍令遭罹重譴一切將士當願忠義在懷保全身世經明行修隱居教授不求聞達一切賢儒當願師道尊嚴大明素學正意出家虔修三學道果未熟一切僧尼當願不退初心終成正覺志慕長生精心修煉大丹未就一切道流當願方便先成回心佛道田野耕桑拾薪採果食力為養一切農民當願地利豐饒全家溫飽百工眾技仰食四方勤苦無成一切人倫當願售賣有方衣糧無乏醫專治疾卜以決疑術業未成一切人倫當願為學精明濟人利物行舟海國列肆市廛所求未遂一切人倫當願物貨濟通豐家富國貪名逐利干謁四方奔走勤勞一切人倫當願清心寡欲樂天知命府史胥徒私居執事奴婢走使一切人倫當願用心公忠處身廉謹攻城略地喜立事功好殺生靈一切人倫當願慈愛在懷敬重物命漁獵屠劊為利殺害販肉自活一切人倫當願亟起慈心頓拋惡業師巫呪術左道惑眾詭祕懷姦一切人倫當願止息邪心回趨大道伶優淫樂豔歌媚舞眩賣女色一切人倫當願自悔自慚改從正業從軍出戍鬬戰身亡濫被軍誅一切人倫當願思悔昔愆永消惡業干戈擾亂轉徙他鄉遇冦遭傷一切人倫當願獲值善人提擕全活刀杖枷鎖非法囚禁遭罹王難一切人倫當願得值公明早獲原放虎狼毒蛇羅剎惡賊風火水難一切人倫當願常起慈心不敢加害中藥中蠱自刎自經牆壓焚溺一切人倫當願宿業消亡復歸善道天雷誅擊冢訟徵呼先亡復連一切人倫當願解釋前因各求超度怨家急取獄鬼誤收邪鬼侵陵一切人倫當願宿善提持應時放釋世智辯聰好事文筆毀瀆佛法一切人倫當願回讚大乘頓消邪見愚騃無知鄙陋下劣不信三寶一切人倫當願深信菩提發明妙智四體不勤終日放縱怠棄諸事一切人倫當願持身勤謹綜理正業受人役使奔走道途勞苦不息一切人倫當願早遂寬閒隨求自足酣酒嗜色博弈遨遊破家蕩產一切人倫當願立志保身重興祖業水陸往來持刀強劫穿窬為盜一切人倫當願改悔前心重尋正業爭財奪產被謗遭讒結成呪詛一切人倫當願解釋怨讎不求加報言語相違交爭不止競相毆擊一切人倫當願兩意相和不成怨結獻諂懷姦擠排賢善唯求自利一切人倫當願忠正居心推尊賢哲信讒惡直嫉妒賢良我慢自高一切人倫當願樂聽忠言喜親有德惡口兩舌好行瞋罵陰毒害人一切人倫當願永絕惡言慈心待物癲癎霍亂中氣中暑客忤魘死一切人倫當願不失本心早逢妙治瘵勞瘟疫癰疽蠱脹惡疾縈纏一切人倫當願早值良醫獲全性命盲聾攣躄中風癱瘓四肢殘廢一切人倫當願早遇神方獲全身相鰥寡孤獨貧困饑寒老病無歸一切人倫當願獲依仁賢終身給養妒寵恃恩驕奢淫悍帷箔不修一切人倫當願內訓閨房守志正潔夫婦年高祈求子息未獲如願一切人倫當願生福德男承家繼業未離襁褓乳絕夭殤薄福嬰孩一切男女當願神物護持延壽無病墮胎傷孕子死腹中產難不出一切女倫當願子母兩全保安性命不孝父母弗育妻孥怨積心離一切人倫當願回心孝慈悔除前業五逆十惡不仁不義不忠不信一切人倫當願實心改革悔除往罪上來修齋無量功德回施法界一切羣靈殷勤勸發四十八願宜悔業因即蒙超度我佛如來有果願真言謹當宣誦娜謨囉怛娜怛囉耶野那莫㫊唎耶婆路枳諦濕縛囉耶菩地薩埵野摩訶薩埵野摩訶迦嚕泥迦野薩縛禰縛素囉那麼塞訖𭌆𦍞三麼三麼努跛囉布囉臡三麼件陀縛皤枲𦍞伽誐娜弭秫第目底跛囉陛惹曳弭惹曳迦野𡫸摩闍播娜野你禰澀跛摩闍沒陀弭輸陀你輸陀野薩縛嚲詫誐跢秫第鉢頭麼弭輸陀你莎縛訶誦呪三徧畢動鐃鈸法師想法界羣生因茲普度咸到道場既屢蒙法喜之益復能陳廣大之願願行成就用嚴法身不退此心可期佛果表白說偈讚三寶宣疏迴向此偈出神變加持經偈云稽首十方三世佛三種常身正法藏勝願菩提大心眾我今皆悉正歸依說偈仰讚法界三寶願於後時再垂明證茲日粤有奉三寶某人修營法界聖凡水陸普度大齋宣行法事今已告圓具有疏文謹當披讀表白宣疏畢法眾進前分讀獻狀候都讀畢復一人讀功德司知委文牒表白為施主及大眾說自慶偈云即法界理起法界心對法界境修法界供向十方佛讚說大乘從大悲門普度六道三檀等施六行俱成是則名為真法供養修齋事畢慶己慶人願諸聖賢腸以護念表白振鈴誦呪發遣白言清夜向闌勝筵將散備行齋事允協物懷示多儀必有初終揆盛禮當全迎送惟聖人尊居常寂本絕去來俾凡情徹悟真歸豈無方便資之法力被以佛光左提右掣而盡空七趣之倫前進後趨而優入九連之品既得生於樂國即回念於塵寰常如是起大悲心極未來弘普度道我佛如來有發遣真言謹當宣誦唵麼訝羅穆羯叉目誦呪三徧畢動鈸回繞座席送聖賢出道場外化煉財馬法師想諸聖賢各以己之威德攝濟六道令其各捨本業轉生淨土一切大眾莫不歡喜踊躍而去水陸儀文世傳起自梁武帝昔白起以長平一坑至四十萬罪大惡極久沈地獄無繇出離致夢於武帝武帝與誌公諸師議救之䇿知大藏有水陸儀文禱之則光明滿堂繇此舉行傳之後世而今藏並無其文金山寺之本亦前後錯雜不見始終頭緒時僧行者亦復隨意所作各各稍殊南都所繪上下堂像隨畫師所傳奉為定規頗不的當而啟建道場者化募資費累月累年始克成就陳設繁文以致士女老幼紛至沓來如俗中看旗看春交足摩肩男女混亂日以千計而不免褺瀆聖賢衝突鬼神失多而過重有禍而無功多致道場不終其事而感惡報甚可懼也惟四明志磐法師所輯儀文至精至密至簡至易精密而不傷於煩長簡易而不病於缺漏其本止存四明諸方皆未之見也予為訂正重壽諸梓以廣流通雖然亦不可易易舉數數舉也易則必至於數數則自生夫易繇是疏於誠敬多諸過愆則求福而反禍矣幸相與慎之竹窻三筆中錄出
